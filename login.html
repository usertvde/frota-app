<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1>🚛 Gestão de Frota</h1>
    <form id="login-form">
      <input type="text" id="login-id" placeholder="Nome de utilizador ou email" required autocomplete="username">
      <input type="password" id="password" placeholder="Palavra-passe" required autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
    <p id="error-msg" style="color:red;"></p>
    <p><a href="#" id="forgot-password">Recuperar palavra-passe</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    const supabase = window.supabase; // já definida globalmente

    // Se já estiver logado, redireciona
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        redirectBasedOnRole(session.user.id);
      }
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const loginId = document.getElementById('login-id').value.trim();
      const password = document.getElementById('password').value;
      let email = loginId;

      // Se não for um email, assume que é um nome de utilizador e obtém o email associado
      if (!loginId.includes('@')) {
        try {
          const { data, error } = await supabase.rpc('get_email_by_username', { p_username: loginId });
          if (error || !data || data.length === 0) {
            document.getElementById('error-msg').textContent = 'Nome de utilizador não encontrado.';
            return;
          }
          email = data; // a função retorna o email diretamente
        } catch (err) {
          document.getElementById('error-msg').textContent = 'Erro ao procurar utilizador.';
          return;
        }
      }

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          document.getElementById('error-msg').textContent = 'Erro de login: ' + error.message;
          console.error('Erro de autenticação:', error);
          return;
        }
        
        if (!data || !data.user) {
          document.getElementById('error-msg').textContent = 'Erro: Resposta de login inválida';
          console.error('Dados de login inválidos:', data);
          return;
        }

        console.log('Login bem-sucedido para usuário:', data.user.id);
        await redirectBasedOnRole(data.user.id);
      } catch (err) {
        document.getElementById('error-msg').textContent = 'Erro inesperado: ' + err.message;
        console.error('Erro durante login:', err);
      }
    });

    // Recuperação de password (usa email, então para o admin pedimos o email associado)
    document.getElementById('forgot-password').addEventListener('click', async (e) => {
      e.preventDefault();
      const loginId = document.getElementById('login-id').value.trim();

        if (!profile) {
          console.error('Perfil não encontrado para user_id:', userId);

  </script>
</body>
</html>
