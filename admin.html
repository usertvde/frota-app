<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔧 Painel Admin</h1>
      <button id="logout-btn">Terminar Sessão</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="vehicles">Veículos</button>
      <button class="tab" data-tab="drivers">Motoristas</button>
      <button class="tab" data-tab="trips">Viagens</button>
      <button class="tab" data-tab="password">Alterar Password</button>
    </div>

    <!-- Painel de Veículos -->
    <div id="vehicles-panel" class="panel active">
      <h2>Gestão de Veículos</h2>
      <form id="vehicle-form">
        <input type="text" id="v-brand" placeholder="Marca" required>
        <input type="text" id="v-model" placeholder="Modelo" required>
        <input type="text" id="v-plate" placeholder="Matrícula" required>
        <input type="number" id="v-year" placeholder="Ano">
        <label>Foto do veículo: <input type="file" id="v-photo" accept="image/*"></label>
        <button type="submit">Adicionar</button>
      </form>
      <div id="vehicles-list"></div>
    </div>

    <!-- Painel de Motoristas -->
    <div id="drivers-panel" class="panel">
      <h2>Gestão de Motoristas</h2>
      <form id="driver-form">
        <input type="email" id="d-email" placeholder="Email do motorista" required>
        <input type="password" id="d-password" placeholder="Palavra-passe temporária" required>
        <input type="text" id="d-name" placeholder="Nome completo">
        <button type="submit">Criar Motorista</button>
      </form>
      <div id="drivers-list"></div>
    </div>

    <!-- Painel de Viagens (admin vê todas) -->
    <div id="trips-panel" class="panel">
      <h2>Todas as Viagens</h2>
      <div>
        <label>Filtrar por data: <input type="date" id="filter-date"></label>
        <label>Veículo: <select id="filter-vehicle"><option value="">Todos</option></select></label>
        <label>Motorista: <select id="filter-driver"><option value="">Todos</option></select></label>
        <button id="apply-filters">Filtrar</button>
      </div>
      <div id="trips-list"></div>
    </div>

    <!-- Painel Alterar Password Admin -->
    <div id="password-panel" class="panel">
      <h2>Alterar a minha palavra-passe</h2>
      <form id="change-password-form">
        <input type="password" id="new-password1" placeholder="Nova palavra-passe" required>
        <input type="password" id="new-password2" placeholder="Confirmar nova palavra-passe" required>
        <button type="submit">Alterar</button>
      </form>
      <p id="change-pwd-msg"></p>
      <hr>
      <h3>Recuperar palavra-passe</h3>
      <p>Email de recuperação: <span id="admin-email"></span> <button id="change-recovery-email">Alterar</button></p>
      <button id="send-reset-email">Enviar link de recuperação para o meu email</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="app.js"></script>
  <script>
    let sessionToken = '';

    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      sessionToken = session.access_token;

      // Verificar se é admin
      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('user_id', session.user.id)
        .single();
      if (!profile || profile.role !== 'admin') {
        alert('Acesso negado');
        window.location.href = 'index.html';
        return;
      }

      setupLogout('logout-btn');
      setupTabs();
      loadVehicles();
      loadDrivers();
      loadTrips();
      loadAdminEmail();
      setupVehicleForm();
      setupDriverForm();
      setupChangePassword();
      setupFilters();
      setupRecovery();
    })();

    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
          if (tab.dataset.tab === 'trips') loadTrips();
        });
      });
    }

    async function loadVehicles() {
      const { data, error } = await supabase.from('vehicles').select('*').order('id', { ascending: false });
      if (error) {
        console.error('Erro ao carregar veículos:', error);
        return;
      }
      const list = document.getElementById('vehicles-list');
      list.innerHTML = data.map(v => `
        <div class="card">
          ${v.photo_url ? `<img src="${v.photo_url}" alt="Foto" style="max-width:150px;">` : ''}
          <p><strong>${v.brand} ${v.model}</strong> (${v.year})</p>
          <p>Matrícula: ${v.license_plate}</p>
          <button onclick="deleteVehicle(${v.id})">Apagar</button>
        </div>
      `).join('');
    }

    window.deleteVehicle = async function(id) {
      if (!confirm('Apagar este veículo?')) return;
      const { error } = await supabase.from('vehicles').delete().eq('id', id);
      if (error) {
        alert('Erro ao apagar: ' + error.message);
      } else {
        loadVehicles();
      }
    };

    function setupVehicleForm() {
      document.getElementById('vehicle-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const brand = document.getElementById('v-brand').value;
        const model = document.getElementById('v-model').value;
        const plate = document.getElementById('v-plate').value;
        const year = document.getElementById('v-year').value;
        const photoFile = document.getElementById('v-photo').files[0];

        let photo_url = null;
        if (photoFile) {
          photo_url = await uploadPhoto(photoFile);
        }

        const { error } = await supabase.from('vehicles').insert({
          brand,
          model,
          license_plate: plate,
          year: parseInt(year) || null,
          photo_url
        });

        if (error) {
          alert('Erro: ' + error.message);
        } else {
          document.getElementById('vehicle-form').reset();
          loadVehicles();
        }
      });
    }

    async function loadDrivers() {
      const { data: drivers, error } = await supabase
        .from('profiles')
        .select('*')
        .eq('role', 'driver')
        .order('id', { ascending: false });

      if (error) {
        console.error('Erro ao carregar motoristas:', error);
        return;
      }

      const list = document.getElementById('drivers-list');
      list.innerHTML = drivers.map(d => `
        <div class="card">
          <p><strong>${d.full_name || 'Sem nome'}</strong></p>
          <p>Email: ${d.email || '-'}</p>
          <button onclick="resetDriverPassword('${d.email}')">Repor password</button>
          <button onclick="deleteDriver('${d.user_id}')">Apagar</button>
        </div>
      `).join('');
    }

    window.resetDriverPassword = async function(email) {
      if (!email) {
        alert('Este motorista não tem email associado.');
        return;
      }
      const result = await callEdgeFunction('reset-password', { email }, sessionToken);
      if (result.error) {
        alert('Erro: ' + result.error);
      } else {
        alert('Email de redefinição enviado para ' + email);
      }
    };

    window.deleteDriver = async function(userId) {
      if (!confirm('Apagar este motorista? Isto remove o acesso permanentemente.')) return;
      const result = await callEdgeFunction('delete-driver', { userId }, sessionToken);
      if (result.error) {
        alert('Erro: ' + result.error);
      } else {
        loadDrivers();
      }
    };

    function setupDriverForm() {
      document.getElementById('driver-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('d-email').value;
        const password = document.getElementById('d-password').value;
        const fullName = document.getElementById('d-name').value;

        const result = await callEdgeFunction('create-driver', { email, password }, sessionToken);
        if (result.error) {
          alert('Erro: ' + result.error);
        } else {
          // Atualizar o nome completo no perfil
          if (fullName) {
            await supabase.from('profiles').update({ full_name: fullName }).eq('user_id', result.userId);
          }
          alert('Motorista criado com sucesso!');
          document.getElementById('driver-form').reset();
          loadDrivers();
        }
      });
    }

    async function loadTrips(filters = {}) {
      let query = supabase
        .from('trips')
        .select('*, vehicles(*), profiles!trips_user_id_fkey(full_name, email)')
        .order('start_time', { ascending: false });

      if (filters.date) {
        query = query.gte('start_time', filters.date).lt('start_time', filters.date + 'T23:59:59');
      }
      if (filters.vehicle_id) {
        query = query.eq('vehicle_id', filters.vehicle_id);
      }
      if (filters.driver_id) {
        query = query.eq('user_id', filters.driver_id);
      }

      const { data: trips, error } = await query;

      if (error) {
        console.error('Erro ao carregar viagens:', error);
        return;
      }

      const list = document.getElementById('trips-list');
      list.innerHTML = trips.map(t => `
        <div class="card">
          <p><strong>${t.vehicles?.brand} ${t.vehicles?.model}</strong> (${t.vehicles?.license_plate})</p>
          <p>Motorista: ${t.profiles?.full_name || t.profiles?.email || 'N/A'}</p>
          <p>Início: ${new Date(t.start_time).toLocaleString()} - Km: ${t.start_km}</p>
          <p>Fim: ${t.end_time ? new Date(t.end_time).toLocaleString() + ' - Km: ' + t.end_km : 'Em andamento'}</p>
          ${t.start_photo_url ? `<img src="${t.start_photo_url}" width="80">` : ''}
          ${t.end_photo_url ? `<img src="${t.end_photo_url}" width="80">` : ''}
          <p>Notas: ${t.notes || '-'}</p>
        </div>
      `).join('');
    }

    function setupFilters() {
      (async () => {
        const { data: vehicles } = await supabase.from('vehicles').select('id, brand, model');
        const vSelect = document.getElementById('filter-vehicle');
        vSelect.innerHTML = '<option value="">Todos</option>' + vehicles.map(v => `<option value="${v.id}">${v.brand} ${v.model}</option>`).join('');

        const { data: drivers } = await supabase.from('profiles').select('user_id, full_name, email').eq('role', 'driver');
        const dSelect = document.getElementById('filter-driver');
        dSelect.innerHTML = '<option value="">Todos</option>' + drivers.map(d => `<option value="${d.user_id}">${d.full_name || d.email}</option>`).join('');
      })();

      document.getElementById('apply-filters').addEventListener('click', () => {
        const date = document.getElementById('filter-date').value;
        const vehicle_id = document.getElementById('filter-vehicle').value;
        const driver_id = document.getElementById('filter-driver').value;
        loadTrips({ date, vehicle_id, driver_id });
      });
    }

    async function loadAdminEmail() {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        document.getElementById('admin-email').textContent = user.email;
      }
    }

    function setupChangePassword() {
      document.getElementById('change-password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw1 = document.getElementById('new-password1').value;
        const pw2 = document.getElementById('new-password2').value;
        const msg = document.getElementById('change-pwd-msg');

        if (pw1 !== pw2) {
          msg.textContent = 'As palavras-passe não coincidem.';
          msg.style.color = 'red';
          return;
        }

        const { error } = await supabase.auth.updateUser({ password: pw1 });
        if (error) {
          msg.textContent = 'Erro: ' + error.message;
          msg.style.color = 'red';
        } else {
          msg.textContent = 'Palavra-passe alterada com sucesso!';
          msg.style.color = 'green';
          document.getElementById('change-password-form').reset();
        }
      });

      document.getElementById('change-recovery-email').addEventListener('click', async () => {
        const newEmail = prompt('Novo email de recuperação:');
        if (!newEmail) return;

        const { error } = await supabase.auth.updateUser({ email: newEmail });
        if (error) {
          alert('Erro: ' + error.message);
        } else {
          alert('Email de recuperação alterado. Verifica a tua caixa de entrada para confirmar a mudança.');
          loadAdminEmail();
        }
      });
    }

    function setupRecovery() {
      document.getElementById('send-reset-email').addEventListener('click', async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
          alert('Erro ao obter dados do utilizador.');
          return;
        }

        if (!user.email) {
          alert('Não tens email de recuperação definido. Define um email primeiro.');
          return;
        }

        const { error } = await supabase.auth.resetPasswordForEmail(user.email, {
          redirectTo: window.location.origin + '/index.html',
        });

        if (error) {
          alert('Erro: ' + error.message);
        } else {
          alert('Email de recuperação enviado para ' + user.email);
        }
      });
    }
  </script>
</body>
</html>
