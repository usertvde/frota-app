<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#007bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Frota Admin">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Admin - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container admin-container">
    <div class="header">
      <h1>🔧 Painel Administrador</h1>
      <button id="logout-btn" class="logout-btn">Sair</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="vehicles">🚗 Veículos</button>
      <button class="tab" data-tab="drivers">👥 Colaboradores</button>
      <button class="tab" data-tab="shifts">📅 Horários</button>
      <button class="tab" data-tab="reports">📊 Relatórios</button>
      <button class="tab" data-tab="settings">⚙️ Definições</button>
    </div>

    <!-- Painel Veículos -->
    <div id="vehicles-panel" class="panel active">
      <h2>Gestão de Veículos</h2>
      <form id="vehicle-form">
        <input type="text" id="v-brand" placeholder="Marca" required>
        <input type="text" id="v-model" placeholder="Modelo" required>
        <input type="text" id="v-plate" placeholder="Matrícula" required>
        <input type="number" id="v-year" placeholder="Ano">
        <label class="file-label">📷 Foto do veículo:
          <input type="file" id="v-photo" accept="image/*" class="file-input">
        </label>
        <button type="submit">✅ Adicionar Veículo</button>
      </form>
      <div id="vehicles-list">A carregar...</div>
    </div>

    <!-- Painel Colaboradores -->
    <div id="drivers-panel" class="panel">
      <h2>Gestão de Colaboradores</h2>
      <form id="driver-form">
        <input type="email" id="d-email" placeholder="Email do colaborador" required>
        <input type="password" id="d-password" placeholder="Palavra-passe temporária" required>
        <input type="text" id="d-name" placeholder="Nome completo">
        <input type="text" id="d-access-number" placeholder="Nº de acesso (4 dígitos)" maxlength="4" pattern="[0-9]{4}">
        <button type="submit">👤 Criar Colaborador</button>
      </form>
      <div id="drivers-list">A carregar...</div>
    </div>

    <!-- Painel Horários (NOVO LAYOUT DIÁRIO) -->
    <div id="shifts-panel" class="panel">
      <h2>Planeamento Diário de Horários</h2>

      <div class="filter-row" style="background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6;">
        <label style="margin: 0;">📅 Selecione o Dia para Planear:
          <input type="date" id="admin-plan-date">
        </label>
      </div>

      <div id="admin-plan-grid" style="margin-top: 20px;">
        <p class="empty-msg">Selecione uma data para ver as disponibilidades.</p>
      </div>

      <h3 style="margin-top: 30px; border-top: 1px dashed #ccc; padding-top: 20px;">📅 Todos os Horários Criados</h3>
      <div id="shifts-list">A carregar...</div>
    </div>

    <!-- Painel Relatórios -->
    <div id="reports-panel" class="panel">
      <h2>Relatórios de Turno</h2>
      <div class="filter-row">
        <label>📅 Data:
          <input type="date" id="report-date">
        </label>
        <label>👤 Colaborador:
          <select id="report-driver">
            <option value="">Todos</option>
          </select>
        </label>
      </div>
      <div class="button-row">
        <button id="generate-report">🔍 Gerar Relatório</button>
        <button id="export-excel" class="export-btn">📥 Exportar Excel</button>
      </div>
      <div id="report-output"></div>
    </div>

    <!-- Painel Definições -->
    <div id="settings-panel" class="panel">
      <h2>Definições do Administrador</h2>
      <form id="admin-settings-form">
        <label>👤 Nome de utilizador:
          <input type="text" id="admin-username" placeholder="admin">
        </label>
        <label>🔒 Nova palavra-passe:
          <input type="password" id="admin-new-pw1" placeholder="Deixar em branco para manter">
        </label>
        <label>🔒 Confirmar palavra-passe:
          <input type="password" id="admin-new-pw2" placeholder="Confirmar nova palavra-passe">
        </label>
        <label>📧 Email de recuperação:
          <input type="email" id="admin-email" placeholder="email@exemplo.com">
        </label>
        <button type="submit">💾 Guardar Alterações</button>
      </form>
      <p id="settings-msg"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      const supabase = window.supabase;
      if (!supabase) { document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:20px;">Erro: Sistema não inicializado. Contacte o administrador.</h1>'; return; }
      let sessionToken = '';
      let currentReportData = [];
      let allVehiclesData = [];

      console.log('admin.html carregado com sucesso');

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
      });

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          const panelId = tab.dataset.tab + '-panel';
          document.getElementById(panelId).classList.add('active');
          if (tab.dataset.tab === 'shifts') loadShiftsPanel();
          if (tab.dataset.tab === 'reports') loadReportDropdowns();
        });
      });

      (async () => {
        try {
          const { data: { session }, error } = await supabase.auth.getSession();
          if (error || !session) { window.location.href = 'index.html'; return; }
          sessionToken = session.access_token;

          const { data: profile } = await supabase.from('profiles').select('role').eq('user_id', session.user.id).single();
          if (!profile || profile.role !== 'admin') { window.location.href = 'index.html'; return; }

          console.log('Admin autenticado');
          setupForms();
          loadVehicles();
          loadDrivers();
          loadShiftsPanel();
          loadAdminSettings();
        } catch (err) {
          console.error('Erro inicial:', err);
        }
      })();

      // ---------- VEÍCULOS ----------
      async function loadVehicles() {
        try {
          const { data, error } = await supabase.from('vehicles').select('*').order('id');
          if (error) throw error;
          allVehiclesData = data || [];
          const container = document.getElementById('vehicles-list');
          if (!data || data.length === 0) {
            container.innerHTML = '<p class="empty-msg">Nenhum veículo registado.</p>';
            return;
          }
          container.innerHTML = data.map(v => `
            <div class="card" id="vehicle-${v.id}">
              <div class="vehicle-display">
                ${v.photo_url ? `<img src="${v.photo_url}" alt="Foto veículo" class="vehicle-img">` : '<div class="no-photo">📷 Sem foto</div>'}
                <div class="vehicle-info">
                  <strong>${v.brand} ${v.model}</strong>
                  <span>Ano: ${v.year || 'N/A'} | Matrícula: ${v.license_plate}</span>
                </div>
                <div class="card-actions">
                  <button class="edit-btn" data-edit-vehicle="${v.id}">✏️ Editar</button>
                  <button class="delete-btn" data-delete-vehicle="${v.id}">🗑️ Apagar</button>
                </div>
              </div>
              <div class="vehicle-edit" style="display:none;">
                <input type="text" class="edit-brand" value="${v.brand}" placeholder="Marca">
                <input type="text" class="edit-model" value="${v.model}" placeholder="Modelo">
                <input type="text" class="edit-plate" value="${v.license_plate}" placeholder="Matrícula">
                <input type="number" class="edit-year" value="${v.year || ''}" placeholder="Ano">
                <div class="edit-actions">
                  <button class="save-btn" data-save-vehicle="${v.id}">💾 Guardar</button>
                  <button class="cancel-btn" data-cancel-vehicle="${v.id}">❌ Cancelar</button>
                </div>
              </div>
            </div>
          `).join('');
          setupVehicleListeners();
        } catch (err) {
          document.getElementById('vehicles-list').innerHTML = '<p class="error-msg">Erro: ' + err.message + '</p>';
        }
      }

      function setupVehicleListeners() {
        document.querySelectorAll('[data-edit-vehicle]').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.editVehicle;
            document.querySelector(`#vehicle-${id} .vehicle-display`).style.display = 'none';
            document.querySelector(`#vehicle-${id} .vehicle-edit`).style.display = 'block';
          });
        });
        document.querySelectorAll('[data-cancel-vehicle]').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.cancelVehicle;
            document.querySelector(`#vehicle-${id} .vehicle-display`).style.display = 'flex';
            document.querySelector(`#vehicle-${id} .vehicle-edit`).style.display = 'none';
          });
        });
        document.querySelectorAll('[data-save-vehicle]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.saveVehicle;
            const brand = document.querySelector(`#vehicle-${id} .edit-brand`).value;
            const model = document.querySelector(`#vehicle-${id} .edit-model`).value;
            const plate = document.querySelector(`#vehicle-${id} .edit-plate`).value;
            const year = document.querySelector(`#vehicle-${id} .edit-year`).value;
            await supabase.from('vehicles').update({ brand, model, license_plate: plate, year: parseInt(year) || null }).eq('id', id);
            loadVehicles();
          });
        });
        document.querySelectorAll('[data-delete-vehicle]').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('Apagar este veículo?')) {
              await supabase.from('vehicles').delete().eq('id', btn.dataset.deleteVehicle);
              loadVehicles();
              loadShiftsPanel();
            }
          });
        });
      }

      // ---------- COLABORADORES ----------
      async function loadDrivers() {
        try {
          const { data, error } = await supabase.from('profiles').select('*').eq('role', 'driver');
          if (error) throw error;
          const container = document.getElementById('drivers-list');
          if (!data || data.length === 0) {
            container.innerHTML = '<p class="empty-msg">Nenhum colaborador registado.</p>';
            return;
          }
          container.innerHTML = data.map(d => `
            <div class="card" id="driver-${d.user_id}">
              <div class="driver-display">
                <div class="driver-info">
                  <strong>${d.full_name || 'Sem nome'}</strong>
                  <span>📧 ${d.email}</span>
                  <span>🔢 Nº Acesso: ${d.access_number || '-'}</span>
                </div>
                <div class="card-actions">
                  <button class="edit-btn" data-edit-driver="${d.user_id}">✏️ Editar</button>
                  <button class="reset-btn" data-reset="${d.email}">🔑 Repor Pass</button>
                  <button class="delete-btn" data-delete="${d.user_id}">🗑️ Apagar</button>
                </div>
              </div>
              <div class="driver-edit" style="display:none;">
                <input type="text" class="edit-fullname" value="${d.full_name || ''}" placeholder="Nome completo">
                <input type="text" class="edit-access" value="${d.access_number || ''}" placeholder="Nº acesso" maxlength="4">
                <div class="edit-actions">
                  <button class="save-btn" data-save-driver="${d.user_id}">💾 Guardar</button>
                  <button class="cancel-btn" data-cancel-driver="${d.user_id}">❌ Cancelar</button>
                </div>
              </div>
            </div>
          `).join('');
          setupDriverListeners();
        } catch (err) {
          document.getElementById('drivers-list').innerHTML = '<p class="error-msg">Erro: ' + err.message + '</p>';
        }
      }

      function setupDriverListeners() {
        document.querySelectorAll('[data-edit-driver]').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.editDriver;
            document.querySelector(`#driver-${id} .driver-display`).style.display = 'none';
            document.querySelector(`#driver-${id} .driver-edit`).style.display = 'block';
          });
        });
        document.querySelectorAll('[data-cancel-driver]').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.cancelDriver;
            document.querySelector(`#driver-${id} .driver-display`).style.display = 'flex';
            document.querySelector(`#driver-${id} .driver-edit`).style.display = 'none';
          });
        });
        document.querySelectorAll('[data-save-driver]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.saveDriver;
            const fullName = document.querySelector(`#driver-${id} .edit-fullname`).value;
            const accessNumber = document.querySelector(`#driver-${id} .edit-access`).value;
            await supabase.from('profiles').update({ full_name: fullName, access_number: accessNumber }).eq('user_id', id);
            loadDrivers();
            loadShiftsPanel();
          });
        });
        document.querySelectorAll('[data-reset]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const res = await fetch(window.EDGE_FUNCTION_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
              body: JSON.stringify({ action: 'reset-password', email: btn.dataset.reset })
            });
            const result = await res.json();
            alert(result.error ? 'Erro: ' + result.error : 'Email de recuperação enviado para ' + btn.dataset.reset);
          });
        });
        document.querySelectorAll('[data-delete]').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Apagar este colaborador? Esta ação é irreversível.')) return;
            const res = await fetch(window.EDGE_FUNCTION_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
              body: JSON.stringify({ action: 'delete-driver', userId: btn.dataset.delete })
            });
            await res.json();
            loadDrivers();
            loadShiftsPanel();
          });
        });
      }

      // ---------- HORÁRIOS (NOVO PLANEAMENTO DIÁRIO) ----------
      async function loadShiftsPanel() {
        try {
          const dateInput = document.getElementById('admin-plan-date');
          if (!dateInput.value) {
            dateInput.value = new Date().toISOString().split('T')[0];
          }
          
          // Garante que os veículos estão carregados
          if (allVehiclesData.length === 0) {
            const { data: vehicles } = await supabase.from('vehicles').select('*');
            allVehiclesData = vehicles || [];
          }

          await loadDailyPlan();
          await loadAllFutureShifts();
        } catch (err) {
          console.error('Erro ao carregar painel de horários:', err);
        }
      }

      document.getElementById('admin-plan-date').addEventListener('change', loadDailyPlan);

      async function loadDailyPlan() {
        const date = document.getElementById('admin-plan-date').value;
        const grid = document.getElementById('admin-plan-grid');
        
        if (!date) {
          grid.innerHTML = '<p class="empty-msg">Selecione uma data.</p>';
          return;
        }

        grid.innerHTML = '<p style="text-align:center;">A carregar planeamento...</p>';

        try {
          // 1. Buscar disponibilidades para esta data
          const { data: availabilities, error: availError } = await supabase
            .from('driver_availability')
            .select('*, profiles(full_name)')
            .eq('date', date)
            .order('start_time');
            
          if (availError) throw availError;

          // 2. Buscar turnos já criados para esta data
          const { data: shifts, error: shiftsError } = await supabase
            .from('shifts')
            .select('*, vehicles(license_plate, brand, model)')
            .eq('date', date);
            
          if (shiftsError) throw shiftsError;

          if (!availabilities || availabilities.length === 0) {
            grid.innerHTML = '<p class="empty-msg">Nenhum colaborador indicou disponibilidade para este dia.</p>';
            return;
          }

          // Agrupar por colaborador
          const driversMap = {};
          availabilities.forEach(a => {
            if (!driversMap[a.driver_id]) {
              driversMap[a.driver_id] = {
                name: a.profiles?.full_name || 'Desconhecido',
                slots: []
              };
            }
            driversMap[a.driver_id].slots.push(a);
          });

          let html = '';
          
          for (const [driverId, driverData] of Object.entries(driversMap)) {
            html += `<div class="card" style="margin-bottom: 15px; border-left: 4px solid #007bff; padding: 15px;">
              <h4 style="margin-top: 0; margin-bottom: 12px; color: #007bff; font-size: 16px;">👤 ${driverData.name}</h4>
              <div style="display: flex; flex-direction: column; gap: 10px;">`;
              
            driverData.slots.forEach(slot => {
              const timeLabel = slot.start_time.substring(0,5) + ' - ' + slot.end_time.substring(0,5);
              
              // Verificar se já existe um turno atribuído para esta exata hora e condutor
              const existingShift = shifts.find(s => s.driver_id === driverId && s.start_time === slot.start_time && s.end_time === slot.end_time);

              html += `<div style="display: flex; flex-wrap: wrap; align-items: center; gap: 10px; background: #f8f9fa; padding: 12px; border-radius: 6px; border: 1px solid #dee2e6;">
                <span style="font-weight: bold; min-width: 120px; font-size: 14px;">🕐 ${timeLabel}</span>`;

              if (existingShift) {
                // Já atribuído
                html += `<span style="color: #28a745; font-weight: bold; flex: 1; font-size: 14px;">✅ Atribuído: ${existingShift.vehicles?.brand} (${existingShift.vehicles?.license_plate})</span>
                <button class="delete-btn-sm" style="margin:0;" onclick="window.removeShift('${existingShift.id}')">🗑️ Remover Turno</button>`;
              } else {
                // Não atribuído - Mostrar dropdown de viaturas
                let vehicleOptions = '<option value="">Selecione a Viatura...</option>';
                allVehiclesData.forEach(v => {
                  // Verificar se a viatura já está ocupada nesta hora por QUALQUER condutor
                  const isVehicleUsed = shifts.find(s => s.vehicle_id === v.id && s.start_time === slot.start_time && s.end_time === slot.end_time);
                  if (isVehicleUsed) {
                    vehicleOptions += `<option value="${v.id}" disabled>❌ ${v.brand} (${v.license_plate}) - Em uso</option>`;
                  } else {
                    vehicleOptions += `<option value="${v.id}">🚗 ${v.brand} (${v.license_plate})</option>`;
                  }
                });

                html += `<select id="veh-select-${slot.id}" style="flex: 1; min-width: 150px; padding: 8px; font-size: 14px; margin: 0;">${vehicleOptions}</select>
                <div style="display: flex; gap: 8px;">
                  <button class="save-btn" style="padding: 8px 12px; font-size: 13px; margin: 0;" onclick="window.assignShift('${driverId}', '${date}', '${slot.start_time}', '${slot.end_time}', '${slot.id}')">✅ Atribuir</button>
                  <button class="cancel-btn" style="padding: 8px 12px; font-size: 13px; margin: 0;" onclick="window.dispenseSlot('${slot.id}')">❌ Sem Trabalho</button>
                </div>`;
              }

              html += `</div>`;
            });

            html += `</div></div>`;
          }

          grid.innerHTML = html;

        } catch (err) {
          grid.innerHTML = '<p class="error-msg">Erro: ' + err.message + '</p>';
        }
      }

      async function loadAllFutureShifts() {
        try {
          const today = new Date().toISOString().split('T')[0];
          const { data: shifts, error } = await supabase
            .from('shifts')
            .select('*, vehicles(license_plate, brand, model), profiles!driver_id(full_name)')
            .gte('date', today)
            .order('date');
            
          if (error) throw error;
          
          const shiftsContainer = document.getElementById('shifts-list');
          if (!shifts || shifts.length === 0) {
            shiftsContainer.innerHTML = '<p class="empty-msg">Nenhum horário futuro criado.</p>';
          } else {
            shiftsContainer.innerHTML = shifts.map(s => `
              <div class="card" style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center;">
                <div style="flex:1; min-width:200px;">
                  <strong>👤 ${s.profiles?.full_name || 'N/A'}</strong> — 🚗 ${s.vehicles?.brand || ''} ${s.vehicles?.model || ''} (${s.vehicles?.license_plate || 'N/A'})<br>
                  📅 ${s.date.split('-').reverse().join('/')} 🕐 ${s.start_time?.substring(0,5)}-${s.end_time?.substring(0,5)} | <span class="status-badge status-${s.status}">${s.status}</span>
                </div>
                <button class="delete-btn-sm" style="margin-top:10px;" onclick="window.removeShift('${s.id}')">🗑️ Remover</button>
              </div>
            `).join('');
          }
        } catch (err) {
          console.error('Erro ao carregar todos os horários:', err);
        }
      }

      // Funções globais para os botões inline
      window.assignShift = async (driverId, date, startTime, endTime, slotId) => {
        const vehicleId = document.getElementById(`veh-select-${slotId}`).value;
        if (!vehicleId) {
          alert('Selecione uma viatura na lista primeiro.');
          return;
        }

        try {
          const { error } = await supabase.from('shifts').insert({
            driver_id: driverId,
            vehicle_id: isNaN(vehicleId) ? vehicleId : parseInt(vehicleId),
            date: date,
            start_time: startTime,
            end_time: endTime
          });
          
          if (error) throw error;
          
          await loadDailyPlan();
          await loadAllFutureShifts();
        } catch (err) {
          alert('Erro ao atribuir turno: ' + err.message);
        }
      };

      window.dispenseSlot = async (slotId) => {
        if (!confirm('Marcar este período como "Sem Trabalho"? Isto irá remover a disponibilidade do colaborador para esta hora.')) return;
        
        try {
          const { error } = await supabase.from('driver_availability').delete().eq('id', slotId);
          if (error) throw error;
          
          await loadDailyPlan();
        } catch (err) {
          alert('Erro ao remover disponibilidade: ' + err.message);
        }
      };

      window.removeShift = async (shiftId) => {
        if (!confirm('Remover este turno? O relatório associado também será apagado.')) return;
        
        try {
          const { error } = await supabase.from('shifts').delete().eq('id', shiftId);
          if (error) throw error;
          
          await loadDailyPlan();
          await loadAllFutureShifts();
        } catch (err) {
          alert('Erro ao remover turno: ' + err.message);
        }
      };

      // ---------- RELATÓRIOS ----------
      async function loadReportDropdowns() {
        const { data: drivers } = await supabase.from('profiles').select('user_id, full_name').eq('role', 'driver');
        document.getElementById('report-driver').innerHTML = '<option value="">Todos</option>' + (drivers || []).map(d => `<option value="${d.user_id}">${d.full_name}</option>`).join('');
      }

      document.getElementById('generate-report').addEventListener('click', async () => {
        const date = document.getElementById('report-date').value;
        const driverId = document.getElementById('report-driver').value;
        let query = supabase.from('shift_reports').select('*, shifts(date, vehicles(*), profiles!driver_id(full_name))');
        if (date) query = query.eq('shifts.date', date);
        if (driverId) query = query.eq('driver_id', driverId);
        const { data } = await query;
        currentReportData = data || [];
        renderReportTable(currentReportData);
      });

      function renderReportTable(data) {
        if (!data || data.length === 0) {
          document.getElementById('report-output').innerHTML = '<p class="empty-msg">Nenhum resultado encontrado.</p>';
          return;
        }
        let html = '<div class="table-wrapper"><table><thead><tr><th>Data</th><th>Colaborador</th><th>Veículo</th><th>Km ini</th><th>Km fim</th><th>Comb. (L)</th><th>Custo (€)</th><th>Fat. (€)</th><th>Fotos</th></tr></thead><tbody>';
        data.forEach(r => {
          let photosHtml = '';
          if (r.start_photo_url) {
            photosHtml += `<a href="${r.start_photo_url}" target="_blank"><img src="${r.start_photo_url}" class="report-thumb" title="Foto inicial" style="width:40px;height:30px;object-fit:cover;"></a> `;
          }
          if (r.end_photo_url) {
            photosHtml += `<a href="${r.end_photo_url}" target="_blank"><img src="${r.end_photo_url}" class="report-thumb" title="Foto final" style="width:40px;height:30px;object-fit:cover;"></a>`;
          }
          if (!photosHtml) photosHtml = '-';

          html += `<tr>
            <td>${r.shifts?.date || '-'}</td>
            <td>${r.shifts?.profiles?.full_name || '-'}</td>
            <td>${r.shifts?.vehicles?.license_plate || '-'}</td>
            <td>${r.start_km || '-'}</td><td>${r.end_km || '-'}</td>
            <td>${r.fuel_litres || '-'}</td><td>${r.fuel_cost || '-'}</td><td>${r.invoiced_amount || '-'}</td>
            <td>${photosHtml}</td>
          </tr>`;
        });
        html += '</tbody></table></div>';
        document.getElementById('report-output').innerHTML = html;
      }

      document.getElementById('export-excel').addEventListener('click', () => {
        if (!currentReportData || currentReportData.length === 0) { alert('Sem dados para exportar.'); return; }
        const headers = ['Data', 'Colaborador', 'Veículo', 'Km ini', 'Km fim', 'Comb. (L)', 'Custo (€)', 'Fat. (€)'];
        let csv = headers.join(';') + '\n';
        currentReportData.forEach(r => {
          csv += [
            r.shifts?.date || '',
            r.shifts?.profiles?.full_name || '',
            r.shifts?.vehicles?.license_plate || '',
            r.start_km || '',
            r.end_km || '',
            r.fuel_litres || '',
            r.fuel_cost || '',
            r.invoiced_amount || ''
          ].join(';') + '\n';
        });
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'relatorio_turnos.csv';
        link.click();
      });

      // ---------- DEFINIÇÕES ----------
      async function loadAdminSettings() {
        const { data: { user } } = await supabase.auth.getUser();
        const { data: profile } = await supabase.from('profiles').select('*').eq('user_id', user.id).maybeSingle();
        document.getElementById('admin-username').value = profile?.username || '';
        document.getElementById('admin-email').value = user?.email || '';
      }

      function setupForms() {
        document.getElementById('vehicle-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const brand = document.getElementById('v-brand').value;
          const model = document.getElementById('v-model').value;
          const plate = document.getElementById('v-plate').value;
          const year = document.getElementById('v-year').value;
          const photoFile = document.getElementById('v-photo').files[0];
          let photo_url = null;
          if (photoFile) {
            const compressed = await compressImage(photoFile);
            const path = `uploads/${Date.now()}_${photoFile.name}`;
            await supabase.storage.from('fleet-photos').upload(path, compressed);
            const { data: urlData } = supabase.storage.from('fleet-photos').getPublicUrl(path);
            photo_url = urlData.publicUrl;
          }
          await supabase.from('vehicles').insert({ brand, model, license_plate: plate, year: parseInt(year) || null, photo_url });
          loadVehicles();
          loadShiftsPanel();
          e.target.reset();
        });

        document.getElementById('driver-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('d-email').value;
          const password = document.getElementById('d-password').value;
          const fullName = document.getElementById('d-name').value;
          const accessNumber = document.getElementById('d-access-number').value;
          const res = await fetch(window.EDGE_FUNCTION_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
            body: JSON.stringify({ action: 'create-driver', email, password })
          });
          const result = await res.json();
          if (result.error) { alert('Erro: ' + result.error); return; }
          await supabase.from('profiles').update({ full_name: fullName, access_number: accessNumber }).eq('user_id', result.userId);
          loadDrivers();
          loadShiftsPanel();
          e.target.reset();
        });

        document.getElementById('admin-settings-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const newUsername = document.getElementById('admin-username').value;
          const pw1 = document.getElementById('admin-new-pw1').value;
          const pw2 = document.getElementById('admin-new-pw2').value;
          const newEmail = document.getElementById('admin-email').value;
          const msg = document.getElementById('settings-msg');
          if (pw1 && pw1 !== pw2) { msg.textContent = 'As palavras-passe não coincidem.'; msg.style.color = 'red'; return; }
          if (newUsername) {
            const user = (await supabase.auth.getUser()).data.user;
            await supabase.from('profiles').update({ username: newUsername }).eq('user_id', user.id);
          }
          if (pw1) await supabase.auth.updateUser({ password: pw1 });
          if (newEmail) await supabase.auth.updateUser({ email: newEmail });
          msg.textContent = 'Definições guardadas com sucesso!';
          msg.style.color = 'green';
        });
      }

      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxWidth = 1200;
              let width = img.width, height = img.height;
              if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
              canvas.width = width; canvas.height = height;
              canvas.getContext('2d').drawImage(img, 0, 0, width, height);
              canvas.toBlob(blob => {
                if (!blob) reject(new Error('Falha ao comprimir'));
                else resolve(new File([blob], file.name || 'foto.jpg', { type: 'image/jpeg' }));
              }, 'image/jpeg', 0.7);
            };
          };
          reader.onerror = reject;
        });
      }
    })();
  </script>
