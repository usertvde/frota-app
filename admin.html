<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container admin-container">
    <div class="header">
      <h1>🔧 Painel Administrador</h1>
      <button id="logout-btn">Sair</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="vehicles">Veículos</button>
      <button class="tab" data-tab="drivers">Colaboradores</button>
      <button class="tab" data-tab="shifts">Horários</button>
      <button class="tab" data-tab="reports">Relatórios</button>
      <button class="tab" data-tab="settings">Definições</button>
    </div>

    <!-- Painel Veículos -->
    <div id="vehicles-panel" class="panel active">
      <h2>Gestão de Veículos</h2>
      <form id="vehicle-form">
        <input type="text" id="v-brand" placeholder="Marca" required>
        <input type="text" id="v-model" placeholder="Modelo" required>
        <input type="text" id="v-plate" placeholder="Matrícula" required>
        <input type="number" id="v-year" placeholder="Ano">
        <label>Foto: <input type="file" id="v-photo" accept="image/*"></label>
        <button type="submit">Adicionar Veículo</button>
      </form>
      <div id="vehicles-list"></div>
    </div>

    <!-- Painel Colaboradores -->
    <div id="drivers-panel" class="panel">
      <h2>Gestão de Colaboradores</h2>
      <form id="driver-form">
        <input type="email" id="d-email" placeholder="Email" required>
        <input type="password" id="d-password" placeholder="Palavra-passe temporária" required>
        <input type="text" id="d-name" placeholder="Nome completo">
        <input type="text" id="d-access-number" placeholder="Nº de acesso (4 dígitos)">
        <button type="submit">Criar Colaborador</button>
      </form>
      <div id="drivers-list"></div>
    </div>

    <!-- Painel Horários -->
    <div id="shifts-panel" class="panel">
      <h2>Horários de Trabalho</h2>
      <form id="shift-form">
        <label>Colaborador: <select id="s-driver" required></select></label>
        <label>Veículo: <select id="s-vehicle" required></select></label>
        <label>Data: <input type="date" id="s-date" required></label>
        <label>Hora início: <input type="time" id="s-start" required></label>
        <label>Hora fim: <input type="time" id="s-end" required></label>
        <button type="submit">Criar Horário</button>
      </form>
      <h3>Disponibilidade dos Colaboradores</h3>
      <div id="availability-list"></div>
      <h3>Horários Criados</h3>
      <div id="shifts-list"></div>
    </div>

    <!-- Painel Relatórios -->
    <div id="reports-panel" class="panel">
      <h2>Relatórios de Turno</h2>
      <div>
        <label>Data: <input type="date" id="report-date"></label>
        <label>Colaborador: <select id="report-driver"><option value="">Todos</option></select></label>
        <button id="generate-report">Gerar Relatório</button>
      </div>
      <div id="report-output"></div>
    </div>

    <!-- Painel Definições -->
    <div id="settings-panel" class="panel">
      <h2>Definições do Administrador</h2>
      <form id="admin-settings-form">
        <label>Novo nome de utilizador: <input type="text" id="admin-username" placeholder="admin"></label>
        <label>Nova palavra-passe: <input type="password" id="admin-new-pw1"></label>
        <label>Confirmar palavra-passe: <input type="password" id="admin-new-pw2"></label>
        <label>Email de recuperação: <input type="email" id="admin-email"></label>
        <button type="submit">Guardar Alterações</button>
      </form>
      <p id="settings-msg"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    // supabase is accessed via window.supabase (defined in supabaseClient.js)
    let sessionToken = null;
    
    if (!window.supabase) {
      console.error('Supabase client not initialized. Please check supabaseClient.js');
      window.location.href = 'index.html';
    }

    // Inicialização
    (async () => {
      try {
        const { data: { session }, error: sessionError } = await window.supabase.auth.getSession();
        if (sessionError) {
          console.error('Erro ao obter sessão:', sessionError);
          window.location.href = 'index.html';
          return;
        }
        
        if (!session) {
          console.log('Sessão não encontrada, redirecionando para login');
          window.location.href = 'index.html';
          return;
        }

        console.log('Sessão encontrada para user:', session.user.id);
        sessionToken = session.access_token;

        const { data: profile, error: profileError } = await window.supabase
          .from('profiles')
          .select('role')
          .eq('user_id', session.user.id)
          .single();

        if (profileError) {
          console.error('Erro ao obter perfil:', profileError);
          alert('Erro ao obter perfil: ' + profileError.message);
          window.location.href = 'index.html';
          return;
        }

        if (!profile) {
          console.error('Perfil não encontrado para user_id:', session.user.id);
          alert('Perfil não encontrado. Apenas administradores podem aceder.');
          window.location.href = 'index.html';
          return;
        }

        if (profile.role !== 'admin') {
          console.error('Utilizador não é admin. Role:', profile.role);
          alert('Acesso negado. Apenas administradores podem aceder.');
          window.location.href = 'index.html';
          return;
        }

        console.log('Acesso de admin confirmado. Carregando painel...');
        setupTabs();
        setupLogout();
        loadVehicles();
        loadDrivers();
        loadShiftsAndAvailability();
        setupForms();
        loadAdminSettings();
      } catch (err) {
        console.error('Erro durante inicialização do admin:', err);
        alert('Erro: ' + err.message);
        window.location.href = 'index.html';
      }
    })();

    function setupLogout() {
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await window.supabase.auth.signOut();
        window.location.href = 'index.html';
      });
    }

    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
          if (tab.dataset.tab === 'shifts') loadShiftsAndAvailability();
          if (tab.dataset.tab === 'reports') loadReportDropdowns();
        });
      });
    }

    // ---------- VEÍCULOS ----------
    async function loadVehicles() {
      try {
        const { data, error } = await window.supabase.from('vehicles').select('*').order('id');
        if (error) throw error;
        document.getElementById('vehicles-list').innerHTML = (data || []).map(v => `
          <div class="card">
            ${v.photo_url ? `<img src="${v.photo_url}" width="100">` : ''}
            <strong>${v.brand} ${v.model}</strong> (${v.year}) - Matrícula: ${v.plate}
            <button onclick="deleteVehicle(${v.id})">Apagar</button>
          </div>
        `).join('');
      } catch (err) {
        console.error('Erro ao carregar veículos:', err);
        document.getElementById('vehicles-list').innerHTML = '<p>Erro: ' + err.message + '</p>';
      }
    }

    window.deleteVehicle = async (id) => {
      if (!confirm('Apagar veículo?')) return;
      try {
        const { error } = await window.supabase.from('vehicles').delete().eq('id', id);
        if (error) throw error;
        await loadVehicles();
        alert('Veículo apagado com sucesso!');
      } catch (err) {
        console.error('Erro ao apagar veículo:', err);
        alert('Erro: ' + err.message);
      }
    };

    // ---------- COLABORADORES ----------
    async function loadDrivers() {
      try {
        const { data, error } = await window.supabase.from('profiles').select('*').eq('role', 'driver');
        if (error) throw error;
        document.getElementById('drivers-list').innerHTML = (data || []).map(d => `
          <div class="card">
            <strong>${d.full_name || 'Sem nome'}</strong> (${d.email}) - Nº: ${d.access_number || '-'}
            <button onclick="resetDriverPassword('${d.email}')">Repor Pass</button>
            <button onclick="deleteDriver('${d.user_id}')">Apagar</button>
          </div>
        `).join('');
      } catch (err) {
        console.error('Erro ao carregar colaboradores:', err);
        document.getElementById('drivers-list').innerHTML = '<p>Erro: ' + err.message + '</p>';
      }
    }

    window.resetDriverPassword = async (email) => {
      try {
        const res = await fetch(window.EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
          body: JSON.stringify({ action: 'reset-password', email })
        });
        const result = await res.json();
        if (result.error) throw new Error(result.error);
        alert('Email de recuperação enviado para ' + email);
      } catch (err) {
        console.error('Erro ao repor password:', err);
        alert('Erro: ' + err.message);
      }
    };

    window.deleteDriver = async (userId) => {
      if (!confirm('Apagar colaborador?')) return;
      try {
        const res = await fetch(window.EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
          body: JSON.stringify({ action: 'delete-driver', userId })
        });
        const result = await res.json();
        if (result.error) throw new Error(result.error);
        await loadDrivers();
        alert('Colaborador apagado com sucesso!');
      } catch (err) {
        console.error('Erro ao apagar colaborador:', err);
        alert('Erro: ' + err.message);
      }
    };

    // ---------- HORÁRIOS E DISPONIBILIDADE ----------
    async function loadShiftsAndAvailability() {
      try {
        // Disponibilidade
        const { data: avail, error: availError } = await window.supabase.from('driver_availability').select('*, profiles(full_name)');
        if (availError) throw availError;
        document.getElementById('availability-list').innerHTML = (avail || []).map(a => `
          <div class="card">
            ${a.profiles?.full_name}: ${a.date} das ${a.start_time} às ${a.end_time}
          </div>
        `).join('');

        // Horários criados
        const { data: shifts, error: shiftsError } = await window.supabase.from('shifts').select('*, vehicles(brand, model, plate), profiles!driver_id(full_name)');
        if (shiftsError) throw shiftsError;
        document.getElementById('shifts-list').innerHTML = (shifts || []).map(s => `
          <div class="card">
            <strong>${s.profiles?.full_name}</strong> - ${s.vehicles?.brand} ${s.vehicles?.model} (${s.vehicles?.plate})<br>
            ${s.shift_date} ${s.start_time}-${s.end_time} [${s.status}]
            <button onclick="deleteShift(${s.id})">Remover</button>
          </div>
        `).join('');
      } catch (err) {
        console.error('Erro ao carregar horários:', err);
        document.getElementById('shifts-list').innerHTML = '<p>Erro: ' + err.message + '</p>';
      }
    }

    window.deleteShift = async (id) => {
      if (!confirm('Remover horário?')) return;
      try {
        const { error } = await window.supabase.from('shifts').delete().eq('id', id);
        if (error) throw error;
        await loadShiftsAndAvailability();
        alert('Horário removido com sucesso!');
      } catch (err) {
        console.error('Erro ao remover horário:', err);
        alert('Erro: ' + err.message);
      }
    };

    // ---------- RELATÓRIOS ----------
    async function loadReportDropdowns() {
      try {
        const { data: drivers, error } = await window.supabase.from('profiles').select('user_id, full_name').eq('role', 'driver');
        if (error) throw error;
        const sel = document.getElementById('report-driver');
        sel.innerHTML = '<option value="">Todos</option>' + (drivers || []).map(d => `<option value="${d.user_id}">${d.full_name}</option>`).join('');
      } catch (err) {
        console.error('Erro ao carregar colaboradores:', err);
      }
    }

    document.getElementById('generate-report').addEventListener('click', async () => {
      try {
        const date = document.getElementById('report-date').value;
        const driverId = document.getElementById('report-driver').value;
        let query = window.supabase.from('shift_reports').select('*, shifts(*, vehicles(*), profiles!driver_id(full_name))');
        if (date) query = query.eq('shifts.shift_date', date);
        if (driverId) query = query.eq('driver_id', driverId);
        const { data, error } = await query;
        if (error) throw error;
        let html = '<table><tr><th>Data</th><th>Colaborador</th><th>Veículo</th><th>Km ini</th><th>Km fim</th><th>Combustível (L)</th><th>Custo (€)</th><th>Faturado (€)</th><th>Notas</th></tr>';
        (data || []).forEach(r => {
          html += `<tr>
            <td>${r.shifts?.shift_date}</td>
            <td>${r.shifts?.profiles?.full_name}</td>
            <td>${r.shifts?.vehicles?.plate}</td>
            <td>${r.start_km}</td><td>${r.end_km}</td><td>${r.fuel_litres}</td><td>${r.fuel_cost}</td><td>${r.invoiced_amount}</td>
            <td>${r.notes || ''}</td>
          </tr>`;
        });
        html += '</table>';
        document.getElementById('report-output').innerHTML = html;
      } catch (err) {
        console.error('Erro ao gerar relatório:', err);
        document.getElementById('report-output').innerHTML = '<p>Erro: ' + err.message + '</p>';
      }
    });

    // ---------- DEFINIÇÕES ADMIN ----------
    async function loadAdminSettings() {
      try {
        const { data: { user }, error: userError } = await window.supabase.auth.getUser();
        if (userError) throw userError;
        const { data: profile, error: profileError } = await window.supabase.from('profiles').select('*').eq('user_id', user.id).maybeSingle();
        if (profileError) throw profileError;
        document.getElementById('admin-username').value = profile?.username || '';
        document.getElementById('admin-email').value = user?.email || '';
      } catch (err) {
        console.error('Erro ao carregar definições:', err);
      }
    }

    document.getElementById('admin-settings-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const newUsername = document.getElementById('admin-username').value;
        const pw1 = document.getElementById('admin-new-pw1').value;
        const pw2 = document.getElementById('admin-new-pw2').value;
        const newEmail = document.getElementById('admin-email').value;
        const msg = document.getElementById('settings-msg');

        if (pw1 && pw1 !== pw2) {
          msg.textContent = 'As palavras-passe não coincidem.';
          return;
        }

        // Atualizar username
        if (newUsername) {
          const user = (await window.supabase.auth.getUser()).data?.user;
          if (user) {
            await window.supabase.from('profiles').update({ username: newUsername }).eq('user_id', user.id);
          }
        }
        // Atualizar password
        if (pw1) {
          await window.supabase.auth.updateUser({ password: pw1 });
        }
        // Atualizar email
        if (newEmail) {
          await window.supabase.auth.updateUser({ email: newEmail });
        }
        msg.textContent = 'Definições guardadas.';
      } catch (err) {
        console.error('Erro ao guardar definições:', err);
        document.getElementById('settings-msg').textContent = 'Erro: ' + err.message;
      }
    });

    // ---------- FORMULÁRIOS ----------
    function setupForms() {
      document.getElementById('vehicle-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          const brand = document.getElementById('v-brand').value;
          const model = document.getElementById('v-model').value;
          const plate = document.getElementById('v-plate').value;
          const year = document.getElementById('v-year').value;
          const photoFile = document.getElementById('v-photo').files[0];
          let photo_url = null;
          if (photoFile) {
            const compressed = await compressImage(photoFile);
            const path = `uploads/${Date.now()}_${photoFile.name}`;
            const { error } = await window.supabase.storage.from('fleet-photos').upload(path, compressed);
            if (!error) {
              const { data } = window.supabase.storage.from('fleet-photos').getPublicUrl(path);
              photo_url = data.publicUrl;
            }
          }
          const { error } = await window.supabase.from('vehicles').insert({ brand, model, plate, year: parseInt(year) || null, photo_url });
          if (error) throw error;
          await loadVehicles();
          e.target.reset();
          alert('Veículo adicionado com sucesso!');
        } catch (err) {
          console.error('Erro ao adicionar veículo:', err);
          alert('Erro: ' + err.message);
        }
      });

      document.getElementById('driver-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          const email = document.getElementById('d-email').value;
          const password = document.getElementById('d-password').value;
          const fullName = document.getElementById('d-name').value;
          const accessNumber = document.getElementById('d-access-number').value;
          const res = await fetch(window.EDGE_FUNCTION_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
            body: JSON.stringify({ action: 'create-driver', email, password })
          });
          const result = await res.json();
          if (result.error) throw new Error(result.error);
          const { error } = await window.supabase.from('profiles').update({ full_name: fullName, access_number: accessNumber }).eq('user_id', result.userId);
          if (error) throw error;
          await loadDrivers();
          e.target.reset();
          alert('Colaborador criado com sucesso!');
        } catch (err) {
          console.error('Erro ao criar colaborador:', err);
          alert('Erro: ' + err.message);
        }
      });

      document.getElementById('shift-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          const driver_id = document.getElementById('s-driver').value;
          const vehicle_id = document.getElementById('s-vehicle').value;
          const date = document.getElementById('s-date').value;
          const start_time = document.getElementById('s-start').value;
          const end_time = document.getElementById('s-end').value;
          const { error } = await window.supabase.from('shifts').insert({ driver_id, vehicle_id: parseInt(vehicle_id), shift_date: date, start_time, end_time });
          if (error) throw error;
          await loadShiftsAndAvailability();
          e.target.reset();
          alert('Horário criado com sucesso!');
        } catch (err) {
          console.error('Erro ao criar horário:', err);
          alert('Erro: ' + err.message);
        }
      });
    }

    // Função de compressão de imagem (utilitário)
    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxWidth = 1200;
            let width = img.width, height = img.height;
            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            canvas.toBlob(blob => {
              if (!blob) reject(new Error('Falha'));
              else resolve(new File([blob], file.name || 'foto.jpg', { type: 'image/jpeg' }));
            }, 'image/jpeg', 0.7);
          };
        };
        reader.onerror = reject;
      });
    }
  </script>
</body>
</html>
