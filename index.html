<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#007bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Frota">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Login - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1>🚛 Gestão de Frota</h1>

    <div id="install-banner" style="display:none; background:#e8f4fd; padding:15px; border-radius:8px; margin-bottom:20px; text-align:center; border: 2px solid #007bff;">
      <p style="margin:0 0 10px 0; font-weight:bold;">📱 Instale esta aplicação no seu dispositivo</p>
      <p style="margin:0 0 10px 0; font-size:14px;">Acesso rápido e funcionamento offline</p>
      <button id="install-btn" style="background:#28a745; font-size:16px; padding:12px 30px;">📥 Instalar Aplicação</button>
    </div>

    <div id="ios-banner" style="display:none; background:#fff3cd; padding:15px; border-radius:8px; margin-bottom:20px; text-align:center; border: 1px solid #ffc107;">
      <p style="margin:0; font-size:14px;">📱 <strong>iPhone/iPad:</strong> Toque no ícone de partilha <span style="font-size:18px;">⬆️</span> e selecione <strong>"Adicionar ao Ecrã Principal"</strong></p>
    </div>

    <form id="login-form">
      <input type="text" id="login-id" placeholder="Nome de utilizador, nº de acesso ou email" required autocomplete="username">
      <input type="password" id="password" placeholder="Palavra-passe" required autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
    <p id="error-msg" style="color:red;"></p>
    <p><a href="#" id="forgot-password">Recuperar palavra-passe</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      const supabase = window.supabase;
      if (!supabase) {
        document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:20px;">Erro: Sistema não inicializado. Contacte o administrador.</h1>';
        return;
      }

      console.log('index.html carregado com sucesso');

      let deferredPrompt;

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registado:', reg.scope))
            .catch(err => console.error('Erro ao registar Service Worker:', err));
        });
      }

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                           (typeof navigator.standalone !== 'undefined' && navigator.standalone);

      if (isIOS && !isStandalone) {
        document.getElementById('ios-banner').style.display = 'block';
      }

      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('Evento beforeinstallprompt capturado');
        e.preventDefault();
        deferredPrompt = e;
        if (!isStandalone) {
          document.getElementById('install-banner').style.display = 'block';
        }
      });

      if (isStandalone) {
        document.getElementById('install-banner').style.display = 'none';
        document.getElementById('ios-banner').style.display = 'none';
      }

      document.getElementById('install-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log('Resultado da instalação:', outcome);
          deferredPrompt = null;
          document.getElementById('install-banner').style.display = 'none';
        } else {
          document.getElementById('install-banner').style.display = 'none';
        }
      });

      window.addEventListener('appinstalled', () => {
        console.log('Aplicação instalada com sucesso!');
        document.getElementById('install-banner').style.display = 'none';
        document.getElementById('ios-banner').style.display = 'none';
        deferredPrompt = null;
      });

      async function redirectBasedOnRole(userId) {
        try {
          const { data: profile, error } = await supabase
            .from('profiles')
            .select('role')
            .eq('user_id', userId)
            .single();

          if (error || !profile) {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
            return;
          }

          if (profile.role === 'admin') {
            window.location.href = 'admin.html';
          } else if (profile.role === 'driver') {
            window.location.href = 'driver.html';
          } else {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
          }
        } catch (err) {
          console.error('Erro ao redirecionar:', err);
          window.location.href = 'index.html';
        }
      }

      (async () => {
        try {
          const { data: { session }, error } = await supabase.auth.getSession();
          if (error) {
            console.error('Erro ao verificar sessão:', error);
            return;
          }
          if (session) {
            console.log('Sessão ativa encontrada, redirecionando...');
            await redirectBasedOnRole(session.user.id);
          }
        } catch (err) {
          console.error('Erro ao verificar sessão:', err);
        }
      })();

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loginId = document.getElementById('login-id').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        errorMsg.textContent = '';

        if (!loginId || !password) {
          errorMsg.textContent = 'Preencha todos os campos.';
          return;
        }

        let email = loginId;

        if (!loginId.includes('@')) {
          try {
            const { data: emailByUsername, error: usernameError } = await supabase.rpc('get_email_by_username', { p_username: loginId });

            if (!usernameError && emailByUsername) {
              email = emailByUsername;
            } else {
              const { data: emailByAccess, error: accessError } = await supabase.rpc('get_email_by_access_number', { p_access_number: loginId });

              if (!accessError && emailByAccess) {
                email = emailByAccess;
              } else {
                errorMsg.textContent = 'Utilizador não encontrado. Verifique o nome de utilizador, nº de acesso ou email.';
                return;
              }
            }
          } catch (err) {
            errorMsg.textContent = 'Erro ao procurar utilizador. Tente novamente.';
            return;
          }
        }

        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });

          if (error) {
            if (error.message.includes('Invalid login credentials')) {
              errorMsg.textContent = 'Credenciais inválidas. Verifique a palavra-passe.';
            } else if (error.message.includes('Email not confirmed')) {
              errorMsg.textContent = 'Email não confirmado. Contacte o administrador.';
            } else {
              errorMsg.textContent = 'Erro de login: ' + error.message;
            }
            return;
          }

          if (!data || !data.user) {
            errorMsg.textContent = 'Erro: Resposta de login inválida.';
            return;
          }

          console.log('Login bem-sucedido, redirecionando...');
          await redirectBasedOnRole(data.user.id);
        } catch (err) {
          errorMsg.textContent = 'Erro inesperado: ' + err.message;
        }
      });

      document.getElementById('forgot-password').addEventListener('click', async (e) => {
        e.preventDefault();
        const loginId = document.getElementById('login-id').value.trim();

        if (!loginId) {
          alert('Introduza o seu nome de utilizador, nº de acesso ou email primeiro.');
          return;
        }

        let email = loginId;

        if (!loginId.includes('@')) {
          try {
            const { data: emailByUsername } = await supabase.rpc('get_email_by_username', { p_username: loginId });
            if (emailByUsername) {
              email = emailByUsername;
            } else {
              const { data: emailByAccess } = await supabase.rpc('get_email_by_access_number', { p_access_number: loginId });
              if (emailByAccess) {
                email = emailByAccess;
              } else {
                alert('Utilizador não encontrado. Contacte o administrador.');
                return;
              }
            }
          } catch (err) {
            alert('Erro ao procurar utilizador. Tente novamente.');
            return;
          }
        }

        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/index.html',
          });

          if (error) {
            alert('Erro: ' + error.message);
          } else {
            alert('Email de recuperação enviado para ' + email + '. Verifique a sua caixa de entrada.');
          }
        } catch (err) {
          alert('Erro: ' + err.message);
        }
      });
    })();
  </script>
</body>
</html>
