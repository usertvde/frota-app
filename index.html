<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1>🚛 Gestão de Frota</h1>
    <form id="login-form">
      <input type="text" id="login-id" placeholder="Nome de utilizador, nº de acesso ou email" required autocomplete="username">
      <input type="password" id="password" placeholder="Palavra-passe" required autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
    <p id="error-msg" style="color:red;"></p>
    <p><a href="#" id="forgot-password">Recuperar palavra-passe</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      const supabase = window.supabase;
      if (!supabase) {
        document.body.innerHTML = '<h1 style="color:red;">Erro: Supabase não carregou.</h1>';
        return;
      }

      console.log('index.html iniciado');

      // Redirecionar com base no perfil
      async function redirectBasedOnRole(userId) {
        try {
          const { data: profile, error } = await supabase
            .from('profiles')
            .select('role')
            .eq('user_id', userId)
            .single();

          if (error || !profile) {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
            return;
          }

          if (profile.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'driver.html';
          }
        } catch (err) {
          console.error('Erro ao redirecionar:', err);
          window.location.href = 'index.html';
        }
      }

      // Verificar sessão ativa ao carregar
      (async () => {
        try {
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            console.log('Sessão ativa encontrada, redirecionando...');
            await redirectBasedOnRole(session.user.id);
          }
        } catch (err) {
          console.error('Erro ao verificar sessão:', err);
        }
      })();

      // Evento de submit do formulário
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loginId = document.getElementById('login-id').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        errorMsg.textContent = '';

        let email = loginId;

        // Se não for email, descobrir o email correto
        if (!loginId.includes('@')) {
          try {
            // Verificar se é um nome de utilizador (admin)
            const { data: emailByUsername, error: usernameError } = await supabase.rpc('get_email_by_username', { p_username: loginId });
            if (!usernameError && emailByUsername) {
              email = emailByUsername;
            } else {
              // Verificar se é um número de acesso (colaborador)
              const { data: emailByAccess, error: accessError } = await supabase.rpc('get_email_by_access_number', { p_access_number: loginId });
              if (!accessError && emailByAccess) {
                email = emailByAccess;
              } else {
                errorMsg.textContent = 'Utilizador não encontrado. Verifique o nome, nº de acesso ou email.';
                return;
              }
            }
          } catch (err) {
            errorMsg.textContent = 'Erro ao procurar utilizador.';
            console.error(err);
            return;
          }
        }

        // Fazer login
        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) {
            errorMsg.textContent = 'Erro de login: ' + error.message;
            console.error('Erro de autenticação:', error);
            return;
          }

          if (!data || !data.user) {
            errorMsg.textContent = 'Erro: Resposta de login inválida.';
            return;
          }

          console.log('Login bem-sucedido, redirecionando...');
          await redirectBasedOnRole(data.user.id);
        } catch (err) {
          errorMsg.textContent = 'Erro inesperado: ' + err.message;
          console.error('Erro durante login:', err);
        }
      });

      // Recuperar palavra-passe
      document.getElementById('forgot-password').addEventListener('click', async (e) => {
        e.preventDefault();
        const loginId = document.getElementById('login-id').value.trim();
        let email = loginId;

        if (!loginId.includes('@')) {
          try {
            // Tentar username primeiro
            const { data: emailByUsername } = await supabase.rpc('get_email_by_username', { p_username: loginId });
            if (emailByUsername) {
              email = emailByUsername;
            } else {
              // Tentar número de acesso
              const { data: emailByAccess } = await supabase.rpc('get_email_by_access_number', { p_access_number: loginId });
              if (emailByAccess) {
                email = emailByAccess;
              } else {
                alert('Introduza um identificador válido primeiro ou contacte o administrador.');
                return;
              }
            }
          } catch (err) {
            alert('Erro ao procurar utilizador.');
            return;
          }
        }

        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/index.html',
          });
          if (error) {
            alert('Erro: ' + error.message);
          } else {
            alert('Email de recuperação enviado para ' + email);
          }
        } catch (err) {
          alert('Erro: ' + err.message);
        }
      });
    })();
  </script>
</body>
</html>
