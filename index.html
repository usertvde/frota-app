<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#007bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Frota">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Login - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1>🚛 Gestão de Frota</h1>

    <div id="install-banner" style="display:none; background:#e8f4fd; padding:20px; border-radius:12px; margin-bottom:20px; text-align:center; border: 2px solid #007bff;">
      <p style="margin:0 0 12px 0; font-weight:bold; font-size:18px;">📱 Instalar App</p>
      <p style="margin:0 0 15px 0; font-size:14px;">Toque no botão abaixo para instalar no seu dispositivo</p>
      <button id="install-btn" style="background:#28a745; color:white; font-size:18px; padding:14px 40px; border:none; border-radius:8px; font-weight:bold; width:100%;">📥 Instalar Agora</button>
    </div>

    <div id="ios-banner" style="display:none; background:#fff3cd; padding:15px; border-radius:8px; margin-bottom:20px; text-align:center; border: 1px solid #ffc107;">
      <p style="margin:0; font-size:14px;">📱 <strong>iPhone/iPad:</strong> Toque no ícone de partilha <span style="font-size:18px;">⬆️</span> no Safari e selecione <strong>"Adicionar ao Ecrã Principal"</strong></p>
    </div>

    <form id="login-form">
      <input type="text" id="login-id" placeholder="Nome de utilizador, nº de acesso ou email" required autocomplete="username">
      <input type="password" id="password" placeholder="Palavra-passe" required autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
    <p id="error-msg" style="color:red;"></p>
    <p><a href="#" id="forgot-password">Recuperar palavra-passe</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      const supabase = window.supabase;
      if (!supabase) {
        document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:20px;">Erro: Sistema não inicializado. Contacte o administrador.</h1>';
        return;
      }

      console.log('index.html carregado com sucesso');

      // =============================================
      // PWA - INSTALAÇÃO
      // =============================================
      let deferredPrompt;

      // Registar Service Worker imediatamente
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registado:', reg.scope))
          .catch(err => console.error('Erro ao registar Service Worker:', err));
      }

      // Detetar iOS
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      // Detetar se já está instalado
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                           (typeof navigator.standalone !== 'undefined' && navigator.standalone);

      // Mostrar instruções iOS se for iPhone/iPad e não estiver instalado
      if (isIOS && !isStandalone) {
        document.getElementById('ios-banner').style.display = 'block';
      }

      // Se já estiver instalado, esconder tudo
      if (isStandalone) {
        document.getElementById('install-banner').style.display = 'none';
        document.getElementById('ios-banner').style.display = 'none';
      }

      // Capturar evento beforeinstallprompt (disparado pelo Chrome/Edge)
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('beforeinstallprompt capturado!');
        e.preventDefault();
        deferredPrompt = e;
        if (!isStandalone) {
          document.getElementById('install-banner').style.display = 'block';
        }
      });

      // FALLBACK: Se o evento beforeinstallprompt não for disparado em 5 segundos,
      // mostrar o botão na mesma (o utilizador pode instalar manualmente)
      setTimeout(() => {
        if (!deferredPrompt && !isStandalone && !isIOS && document.getElementById('install-banner').style.display === 'none') {
          console.log('Fallback: a mostrar botão de instalação');
          document.getElementById('install-banner').style.display = 'block';
        }
      }, 5000);

      // Também mostrar se o utilizador interagir com a página (clique)
      document.addEventListener('click', function showBannerOnInteraction() {
        if (!deferredPrompt && !isStandalone && !isIOS && document.getElementById('install-banner').style.display === 'none') {
          document.getElementById('install-banner').style.display = 'block';
        }
        document.removeEventListener('click', showBannerOnInteraction);
      }, { once: true });

      // Botão de instalação
      document.getElementById('install-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
          // Mostrar diálogo nativo de instalação
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log('Resultado:', outcome);
          deferredPrompt = null;
          document.getElementById('install-banner').style.display = 'none';
        } else if (isIOS) {
          alert('No iPhone/iPad:\n\n1. Toque no ícone de partilha (⬆️) no Safari\n2. Selecione "Adicionar ao Ecrã Principal"\n3. Toque em "Adicionar"');
        } else {
          // Instruções manuais
          alert('Para instalar:\n\n• Chrome Android: Menu (⋮) → "Instalar aplicação"\n• Edge: Menu (⋯) → "Aplicações" → "Instalar este site como aplicação"\n• PC: Ícone na barra de endereços');
          document.getElementById('install-banner').style.display = 'none';
        }
      });

      // Quando instalado com sucesso
      window.addEventListener('appinstalled', () => {
        console.log('App instalada!');
        document.getElementById('install-banner').style.display = 'none';
        document.getElementById('ios-banner').style.display = 'none';
        deferredPrompt = null;
      });

      // =============================================
      // REDIRECIONAMENTO
      // =============================================
      async function redirectBasedOnRole(userId) {
        try {
          const { data: profile, error } = await supabase
            .from('profiles')
            .select('role')
            .eq('user_id', userId)
            .single();

          if (error || !profile) {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
            return;
          }

          if (profile.role === 'admin') {
            window.location.href = 'admin.html';
          } else if (profile.role === 'driver') {
            window.location.href = 'driver.html';
          } else {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
          }
        } catch (err) {
          console.error('Erro ao redirecionar:', err);
          window.location.href = 'index.html';
        }
      }

      // =============================================
      // VERIFICAR SESSÃO
      // =============================================
      (async () => {
        try {
          const { data: { session }, error } = await supabase.auth.getSession();
          if (error) {
            console.error('Erro ao verificar sessão:', error);
            return;
          }
          if (session) {
            console.log('Sessão ativa, redirecionando...');
            await redirectBasedOnRole(session.user.id);
          }
        } catch (err) {
          console.error('Erro ao verificar sessão:', err);
        }
      })();

      // =============================================
      // LOGIN
      // =============================================
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loginId = document.getElementById('login-id').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        errorMsg.textContent = '';

        if (!loginId || !password) {
          errorMsg.textContent = 'Preencha todos os campos.';
          return;
        }

        let email = loginId;

        if (!loginId.includes('@')) {
          try {
            const { data: emailByUsername, error: usernameError } = await supabase.rpc('get_email_by_username', { p_username: loginId });
            if (!usernameError && emailByUsername) {
              email = emailByUsername;
            } else {
              const { data: emailByAccess, error: accessError } = await supabase.rpc('get_email_by_access_number', { p_access_number: loginId });
              if (!accessError && emailByAccess) {
                email = emailByAccess;
              } else {
                errorMsg.textContent = 'Utilizador não encontrado.';
                return;
              }
            }
          } catch (err) {
            errorMsg.textContent = 'Erro ao procurar utilizador.';
            return;
          }
        }

        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) {
            errorMsg.textContent = error.message.includes('Invalid login credentials') ? 'Credenciais inválidas.' : 'Erro: ' + error.message;
            return;
          }
          if (!data || !data.user) {
            errorMsg.textContent = 'Erro: Resposta inválida.';
            return;
          }
          await redirectBasedOnRole(data.user.id);
        } catch (err) {
          errorMsg.textContent = 'Erro: ' + err.message;
        }
      });

      // =============================================
      // RECUPERAR PASSWORD
      // =============================================
      document.getElementById('forgot-password').addEventListener('click', async (e) => {
        e.preventDefault();
        const loginId = document.getElementById('login-id').value.trim();
        if (!loginId) { alert('Introduza o seu identificador primeiro.'); return; }

        let email = loginId;
        if (!loginId.includes('@')) {
          const { data: emailByUsername } = await supabase.rpc('get_email_by_username', { p_username: loginId });
          email = emailByUsername || (await supabase.rpc('get_email_by_access_number', { p_access_number: loginId })).data;
        }

        const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/index.html' });
        if (error) alert('Erro: ' + error.message);
        else alert('Email enviado para ' + email);
      });
    })();
  </script>
</body>
</html>
