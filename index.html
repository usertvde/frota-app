<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#007bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Frota">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Login - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1>🚛 Gestão de Frota</h1>
    
    <!-- Botão de instalação PWA -->
    <div id="install-banner" style="display:none; background:#e8f4fd; padding:15px; border-radius:8px; margin-bottom:20px; text-align:center;">
      <p style="margin:0 0 10px 0;">📱 Instale esta aplicação no seu dispositivo para acesso rápido</p>
      <button id="install-btn" style="background:#28a745; font-size:16px;">Instalar Aplicação</button>
    </div>

    <form id="login-form">
      <input type="text" id="login-id" placeholder="Nome de utilizador, nº de acesso ou email" required autocomplete="username">
      <input type="password" id="password" placeholder="Palavra-passe" required autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
    <p id="error-msg" style="color:red;"></p>
    <p><a href="#" id="forgot-password">Recuperar palavra-passe</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      const supabase = window.supabase;
      if (!supabase) {
        document.body.innerHTML = '<h1 style="color:red;">Erro: Sistema não inicializado. Contacte o administrador.</h1>';
        return;
      }

      console.log('index.html carregado com sucesso');

      // =============================================
      // PWA - INSTALAÇÃO
      // =============================================
      let deferredPrompt;

      // Registar o Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('Service Worker registado com sucesso:', registration.scope);
            })
            .catch(err => {
              console.error('Erro ao registar Service Worker:', err);
            });
        });
      }

      // Capturar o evento de instalação PWA
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('Evento beforeinstallprompt capturado');
        // Prevenir que o browser mostre o diálogo automaticamente
        e.preventDefault();
        // Guardar o evento para usar mais tarde
        deferredPrompt = e;
        // Mostrar o banner de instalação
        const banner = document.getElementById('install-banner');
        if (banner) {
          banner.style.display = 'block';
        }
      });

      // Botão de instalação
      document.getElementById('install-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
          // Mostrar o diálogo de instalação
          deferredPrompt.prompt();
          // Esperar pela resposta do utilizador
          const { outcome } = await deferredPrompt.userChoice;
          console.log('Resultado da instalação:', outcome);
          // Limpar o evento guardado
          deferredPrompt = null;
          // Esconder o banner
          document.getElementById('install-banner').style.display = 'none';
        } else {
          // Se o evento não estiver disponível, dar instruções
          alert('Para instalar esta aplicação:\n\n' +
                '• Android: Abra o menu do Chrome (3 pontos) e selecione "Adicionar ao ecrã inicial"\n\n' +
                '• iPhone/iPad: Toque no ícone de partilha (Safari) e selecione "Adicionar ao Ecrã Principal"\n\n' +
                '• Computador: Clique no ícone de instalação na barra de endereços');
        }
      });

      // Esconder o banner se a app já estiver instalada
      if (window.matchMedia('(display-mode: standalone)').matches) {
        document.getElementById('install-banner').style.display = 'none';
      }

      // Detetar quando a app é instalada
      window.addEventListener('appinstalled', () => {
        console.log('Aplicação instalada com sucesso!');
        document.getElementById('install-banner').style.display = 'none';
        deferredPrompt = null;
      });

      // =============================================
      // FUNÇÃO DE REDIRECIONAMENTO
      // =============================================
      async function redirectBasedOnRole(userId) {
        try {
          const { data: profile, error } = await supabase
            .from('profiles')
            .select('role')
            .eq('user_id', userId)
            .single();

          if (error) {
            console.error('Erro ao obter perfil:', error);
            await supabase.auth.signOut();
            window.location.href = 'index.html';
            return;
          }

          if (!profile) {
            console.error('Perfil não encontrado');
            await supabase.auth.signOut();
            window.location.href = 'index.html';
            return;
          }

          if (profile.role === 'admin') {
            window.location.href = 'admin.html';
          } else if (profile.role === 'driver') {
            window.location.href = 'driver.html';
          } else {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
          }
        } catch (err) {
          console.error('Erro ao redirecionar:', err);
          window.location.href = 'index.html';
        }
      }

      // =============================================
      // VERIFICAR SESSÃO ATIVA
      // =============================================
      (async () => {
        try {
          const { data: { session }, error } = await supabase.auth.getSession();
          if (error) {
            console.error('Erro ao verificar sessão:', error);
            return;
          }
          if (session) {
            console.log('Sessão ativa encontrada, redirecionando...');
            await redirectBasedOnRole(session.user.id);
          }
        } catch (err) {
          console.error('Erro ao verificar sessão:', err);
        }
      })();

      // =============================================
      // FORMULÁRIO DE LOGIN
      // =============================================
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loginId = document.getElementById('login-id').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        errorMsg.textContent = '';

        if (!loginId || !password) {
          errorMsg.textContent = 'Preencha todos os campos.';
          return;
        }

        let email = loginId;

        if (!loginId.includes('@')) {
          try {
            const { data: emailByUsername, error: usernameError } = await supabase.rpc('get_email_by_username', { p_username: loginId });
            
            if (!usernameError && emailByUsername) {
              email = emailByUsername;
            } else {
              const { data: emailByAccess, error: accessError } = await supabase.rpc('get_email_by_access_number', { p_access_number: loginId });
              
              if (!accessError && emailByAccess) {
                email = emailByAccess;
              } else {
                errorMsg.textContent = 'Utilizador não encontrado. Verifique os dados.';
                return;
              }
            }
          } catch (err) {
            errorMsg.textContent = 'Erro ao procurar utilizador.';
            return;
          }
        }

        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });

          if (error) {
            if (error.message.includes('Invalid login credentials')) {
              errorMsg.textContent = 'Credenciais inválidas.';
            } else {
              errorMsg.textContent = 'Erro: ' + error.message;
            }
            return;
          }

          if (!data || !data.user) {
            errorMsg.textContent = 'Erro: Resposta inválida.';
            return;
          }

          await redirectBasedOnRole(data.user.id);
        } catch (err) {
          errorMsg.textContent = 'Erro inesperado: ' + err.message;
        }
      });

      // =============================================
      // RECUPERAR PALAVRA-PASSE
      // =============================================
      document.getElementById('forgot-password').addEventListener('click', async (e) => {
        e.preventDefault();
        const loginId = document.getElementById('login-id').value.trim();
        
        if (!loginId) {
          alert('Introduza o seu identificador primeiro.');
          return;
        }

        let email = loginId;

        if (!loginId.includes('@')) {
          try {
            const { data: emailByUsername } = await supabase.rpc('get_email_by_username', { p_username: loginId });
            if (emailByUsername) {
              email = emailByUsername;
            } else {
              const { data: emailByAccess } = await supabase.rpc('get_email_by_access_number', { p_access_number: loginId });
              if (emailByAccess) {
                email = emailByAccess;
              } else {
                alert('Utilizador não encontrado. Contacte o administrador.');
                return;
              }
            }
          } catch (err) {
            alert('Erro ao procurar utilizador.');
            return;
          }
        }

        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/index.html',
          });

          if (error) {
            alert('Erro: ' + error.message);
          } else {
            alert('Email de recuperação enviado para ' + email);
          }
        } catch (err) {
          alert('Erro: ' + err.message);
        }
      });
    })();
  </script>
</body>
</html>
