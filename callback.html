<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>A carregar...</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
</head>
<body>
  <p>A processar o login...</p>
  <script>
    (async () => {
      const { data: { session }, error } = await window.supabase.auth.getSession();
      if (session) {
        window.location.href = 'app.html';
      } else if (error) {
        document.body.innerHTML = `Erro: ${error.message}. <br> <a href="/">Tenta novamente</a>`;
      } else {
        document.body.innerHTML = 'Sessão não encontrada. <a href="/">Tenta novamente</a>';
      }
    })();
  </script>
</body>
</html>
