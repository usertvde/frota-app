<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colaborador - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 Painel do Colaborador</h1>
      <button id="logout-btn">Sair</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="my-shifts">Os Meus Horários</button>
      <button class="tab" data-tab="availability">Disponibilidade</button>
      <button class="tab" data-tab="history">Histórico</button>
    </div>

    <div id="my-shifts-panel" class="panel active">
      <h2>Horários de Hoje e Futuros</h2>
      <div id="shifts-today"></div>
    </div>

    <div id="availability-panel" class="panel">
      <h2>Definir Disponibilidade</h2>
      <form id="availability-form">
        <label>Data: <input type="date" id="av-date" required></label>
        <label>Hora início: <input type="time" id="av-start" required></label>
        <label>Hora fim: <input type="time" id="av-end" required></label>
        <button type="submit">Adicionar</button>
      </form>
      <div id="availability-list"></div>
    </div>

    <div id="history-panel" class="panel">
      <h2>Histórico de Turnos</h2>
      <div id="history-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    let supabase = window.supabase;
    let currentUser = null;

    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;

      const { data: profile } = await supabase.from('profiles').select('role').eq('user_id', currentUser.id).single();
      if (!profile || profile.role !== 'driver') { window.location.href = 'index.html'; return; }

      setupTabs();
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
      });

      loadMyShifts();
      loadAvailability();
      loadHistory();
      setupAvailabilityForm();
    })();

    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
          if (tab.dataset.tab === 'my-shifts') loadMyShifts();
          if (tab.dataset.tab === 'availability') loadAvailability();
          if (tab.dataset.tab === 'history') loadHistory();
        });
      });
    }

    async function loadMyShifts() {
      const today = new Date().toISOString().split('T')[0];
      const { data: shifts } = await supabase.from('shifts').select('*, vehicles(*)').eq('driver_id', currentUser.id).gte('date', today).order('date');
      const container = document.getElementById('shifts-today');
      if (!shifts.length) {
        container.innerHTML = '<p>Sem horários atribuídos.</p>';
        return;
      }
      container.innerHTML = shifts.map(s => {
        const isStarted = s.status === 'started';
        const isCompleted = s.status === 'completed';
        let actionHtml = '';
        if (!isStarted && !isCompleted) {
          actionHtml = `<button onclick="startShift(${s.id})">Iniciar Turno</button>`;
        } else if (isStarted) {
          actionHtml = `<button onclick="endShift(${s.id})">Encerrar Turno</button>`;
        } else {
          actionHtml = `<em>Concluído</em>`;
        }
        return `<div class="card">
          <strong>${s.vehicles?.brand} ${s.vehicles?.model} (${s.vehicles?.license_plate})</strong><br>
          ${s.date} ${s.start_time}-${s.end_time} [${s.status}]
          ${actionHtml}
        </div>`;
      }).join('');
    }

    window.startShift = async (shiftId) => {
      await supabase.from('shifts').update({ status: 'started' }).eq('id', shiftId);
      // Criar relatório vazio
      await supabase.from('shift_reports').insert({ shift_id: shiftId, driver_id: currentUser.id });
      loadMyShifts();
    };

    window.endShift = async (shiftId) => {
      // Mostrar formulário de encerramento
      const report = await supabase.from('shift_reports').select('*').eq('shift_id', shiftId).single();
      const formHtml = `
        <h3>Encerrar Turno</h3>
        <form id="end-shift-form">
          <label>Km finais: <input type="number" id="end-km" required></label>
          <label>Combustível (litros): <input type="number" step="0.01" id="fuel-litres"></label>
          <label>Custo combustível (€): <input type="number" step="0.01" id="fuel-cost"></label>
          <label>Valor faturado (€): <input type="number" step="0.01" id="invoiced"></label>
          <label>Nº fatura: <input type="text" id="invoice-num"></label>
          <label>Notas: <textarea id="notes"></textarea></label>
          <label>Foto final: <input type="file" id="end-photo" accept="image/*"></label>
          <button type="submit">Encerrar</button>
        </form>
      `;
      const div = document.createElement('div');
      div.innerHTML = formHtml;
      document.getElementById('shifts-today').appendChild(div);
      document.getElementById('end-shift-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const endKm = document.getElementById('end-km').value;
        const fuelLitres = document.getElementById('fuel-litres').value;
        const fuelCost = document.getElementById('fuel-cost').value;
        const invoiced = document.getElementById('invoiced').value;
        const invoiceNum = document.getElementById('invoice-num').value;
        const notes = document.getElementById('notes').value;
        const photoFile = document.getElementById('end-photo').files[0];
        let endPhotoUrl = null;
        if (photoFile) {
          const compressed = await compressImage(photoFile);
          const path = `uploads/${Date.now()}_${photoFile.name}`;
          await supabase.storage.from('fleet-photos').upload(path, compressed);
          const { data } = supabase.storage.from('fleet-photos').getPublicUrl(path);
          endPhotoUrl = data.publicUrl;
        }
        await supabase.from('shift_reports').update({
          end_km: parseInt(endKm),
          fuel_litres: fuelLitres || null,
          fuel_cost: fuelCost || null,
          invoiced_amount: invoiced || null,
          invoice_number: invoiceNum || null,
          notes: notes || null,
          end_photo_url: endPhotoUrl,
          closed: true
        }).eq('shift_id', shiftId);
        await supabase.from('shifts').update({ status: 'completed' }).eq('id', shiftId);
        loadMyShifts();
      });
    };

    // Disponibilidade
    async function loadAvailability() {
      const { data } = await supabase.from('driver_availability').select('*').eq('driver_id', currentUser.id).order('date');
      document.getElementById('availability-list').innerHTML = data.map(a => `
        <div class="card">
          ${a.date} das ${a.start_time} às ${a.end_time}
          <button onclick="deleteAvailability(${a.id})">Remover</button>
        </div>
      `).join('');
    }

    window.deleteAvailability = async (id) => {
      await supabase.from('driver_availability').delete().eq('id', id);
      loadAvailability();
    };

    function setupAvailabilityForm() {
      document.getElementById('availability-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const date = document.getElementById('av-date').value;
        const start = document.getElementById('av-start').value;
        const end = document.getElementById('av-end').value;
        await supabase.from('driver_availability').insert({ driver_id: currentUser.id, date, start_time: start, end_time: end });
        loadAvailability();
        e.target.reset();
      });
    }

    // Histórico
    async function loadHistory() {
      const { data } = await supabase.from('shift_reports').select('*, shifts(*, vehicles(*))').eq('driver_id', currentUser.id).order('created_at', { ascending: false });
      document.getElementById('history-list').innerHTML = data.map(r => `
        <div class="card">
          <strong>${r.shifts?.date} - ${r.shifts?.vehicles?.license_plate}</strong><br>
          Km: ${r.start_km || '-'} / ${r.end_km || '-'} | Combustível: ${r.fuel_litres || '-'}L (${r.fuel_cost || '-'}€)<br>
          Faturado: ${r.invoiced_amount || '-'}€ | Notas: ${r.notes || '-'}
          ${r.closed ? `<br><em>Notas pós-encerramento: ${r.notes_after_close || '-'}</em>` : ''}
        </div>
      `).join('');
    }

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxWidth = 1200;
            let width = img.width, height = img.height;
            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            canvas.toBlob(blob => {
              if (!blob) reject(new Error('Falha'));
              else resolve(new File([blob], file.name || 'foto.jpg', { type: 'image/jpeg' }));
            }, 'image/jpeg', 0.7);
          };
        };
        reader.onerror = reject;
      });
    }
  </script>
</body>
</html>
