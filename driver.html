<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Frota Colaborador">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Colaborador - Gestão de Frota</title>
  
  <!-- Fonte Moderna Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
  
  <!-- Container principal com padding extra no fundo para evitar cortes em telemóveis -->
  <div class="container" style="flex: 1; padding-bottom: 120px;">
    <div class="header">
      <h1>🚚 Painel do Colaborador</h1>
      <button id="logout-btn" class="logout-btn">Sair</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="my-shifts">📅 Os Meus Horários</button>
      <button class="tab" data-tab="availability">🕐 Disponibilidade</button>
      <button class="tab" data-tab="history">📋 Histórico</button>
    </div>

    <!-- Painel Meus Horários -->
    <div id="my-shifts-panel" class="panel active">
      <h2>Horários de Hoje e Futuros</h2>
      <div id="shifts-today">A carregar...</div>
    </div>

    <!-- Painel Disponibilidade -->
    <div id="availability-panel" class="panel">
      <h2>Definir Disponibilidade</h2>

      <div style="background:#f8fafc; padding:20px; border-radius:12px; margin-bottom:25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
        <h3 style="margin-top:0; margin-bottom:15px; color:#2563eb; font-size: 18px;">➕ Adicionar Período</h3>
        <form id="add-period-form" style="background:#fff; padding:15px; border-radius:8px; border:1px solid #e2e8f0; box-shadow: none;">
          <label style="margin-bottom: 10px;">📅 Dia:
            <input type="date" id="period-date" required style="padding: 12px; font-size: 16px;">
          </label>
          <div class="time-row" style="margin-bottom: 15px; display: flex; gap: 10px;">
            <label style="flex: 1;">Início:
              <input type="time" id="period-start" required style="padding: 12px; font-size: 16px;">
            </label>
            <label style="flex: 1;">Fim:
              <input type="time" id="period-end" required style="padding: 12px; font-size: 16px;">
            </label>
          </div>
          <button type="submit" style="padding: 15px; font-size: 16px; font-weight: bold; margin-top: 10px; width: 100%;">✅ Definir Horário</button>
        </form>
      </div>

      <div style="background:#f8fafc; padding:20px; border-radius:12px; margin-bottom:15px; border: 1px solid #e2e8f0;">
        <h3 style="margin-top:0; font-size: 18px;">📋 Períodos Adicionados</h3>
        <div id="periods-list">
          <p class="empty-msg">Nenhum período adicionado.</p>
        </div>
        <div id="replicate-section" style="display:none; margin-top:20px; padding-top:20px; border-top:1px dashed #cbd5e1;">
          <h4 style="margin-top:0; color:#334155;">📅 Replicar para outros dias</h4>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
            <label style="flex:1; min-width:120px;">De:
              <input type="date" id="replicate-from">
            </label>
            <label style="flex:1; min-width:120px;">Até:
              <input type="date" id="replicate-to">
            </label>
            <button id="replicate-btn" style="background:#0ea5e9; white-space:nowrap; padding: 12px 20px;">📅 Replicar</button>
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
        <button id="save-availability-btn" style="background:#10b981; flex: 1; min-width: 200px; padding: 15px; font-size: 16px;">💾 Guardar Disponibilidade</button>
        <button id="clear-availability-btn" style="background:#ef4444; flex: 1; min-width: 150px; padding: 15px; font-size: 16px;">🗑️ Limpar Tudo</button>
      </div>
      <p id="availability-msg" style="margin-top:15px; text-align: center; font-weight: bold;"></p>
    </div>

    <!-- Painel Histórico -->
    <div id="history-panel" class="panel">
      <h2>Histórico de Turnos</h2>
      <div id="history-list">A carregar...</div>
    </div>
  </div>

  <!-- Rodapé da Empresa (SaaS) -->
  <div style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; font-weight: 500; background: #fff; border-top: 1px solid var(--border-color);">
    &copy; <span id="current-year"></span> <span id="company-name-display">Gestão de Frota</span>. Todos os direitos reservados.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      document.getElementById('current-year').textContent = new Date().getFullYear();
      const supabase = window.supabase;
      if (!supabase) { document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:20px;">Erro: Sistema não inicializado.</h1>'; return; }

      let currentUser = null;
      let currentCompanyId = null;
      let availabilityPeriods = [];

      // Logout
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
      });

      // Navegação entre Tabs
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          const panelId = tab.dataset.tab + '-panel';
          const panel = document.getElementById(panelId);
          if (panel) panel.classList.add('active');
          
          if (tab.dataset.tab === 'my-shifts') loadMyShifts();
          if (tab.dataset.tab === 'availability') loadAvailability();
          if (tab.dataset.tab === 'history') loadHistory();
        });
      });

      // Inicialização e Verificação de Perfil
      (async () => {
        try {
          const { data: { session }, error: sessionError } = await supabase.auth.getSession();
          if (sessionError || !session) { window.location.href = 'index.html'; return; }
          currentUser = session.user;

          const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('role, access_number, full_name, company_id, companies(name)')
            .eq('user_id', currentUser.id)
            .single();

          if (profileError || !profile || profile.role !== 'driver') {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
            return;
          }

          currentCompanyId = profile.company_id;

          if (profile.companies && profile.companies.name) {
            document.getElementById('company-name-display').textContent = profile.companies.name;
            document.title = `Condutor - ${profile.companies.name}`;
          }

          if (profile.access_number) {
            document.querySelector('.header h1').textContent += ' (Nº ' + profile.access_number + ')';
          }

          await loadMyShifts();
        } catch (err) { console.error('Erro inicial:', err); }
      })();

      // --- UTILITÁRIOS DE DATA E HORA ---
      function getLocalTodayString() {
        const now = new Date();
        return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
      }

      function getShiftEndDateTime(dateStr, startStr, endStr) {
        const end = new Date(`${dateStr}T${endStr}`);
        if (endStr < startStr) {
          end.setDate(end.getDate() + 1);
        }
        return end;
      }

      // =============================================
      // MEUS HORÁRIOS
      // =============================================
      async function loadMyShifts() {
        try {
          const todayStr = getLocalTodayString();
          const now = new Date();

          const { data: availabilities } = await supabase.from('driver_availability').select('*').eq('driver_id', currentUser.id).gte('date', todayStr).order('date');
          const { data: shifts } = await supabase.from('shifts').select('*, vehicles(*)').eq('driver_id', currentUser.id).gte('date', todayStr).order('date');

          const container = document.getElementById('shifts-today');
          container.innerHTML = '';

          const activeShifts = (shifts || []).filter(s => s.status !== 'completed' && (s.status === 'started' || getShiftEndDateTime(s.date, s.start_time, s.end_time) >= now));
          const activeAvails = (availabilities || []).filter(a => getShiftEndDateTime(a.date, a.start_time, a.end_time) >= now);

          if (activeAvails.length === 0 && activeShifts.length === 0) {
            container.innerHTML = '<p class="empty-msg">Sem horários ativos para hoje ou dias futuros.</p>';
            return;
          }

          let html = '';
          const processedShiftIds = new Set();

          const generateCard = (avail, shift) => {
            const date = avail ? avail.date : shift.date;
            const start = avail ? avail.start_time : shift.start_time;
            const end = avail ? avail.end_time : shift.end_time;
            const dateLabel = date.split('-').reverse().join('/');
            const timeLabel = start.substring(0,5) + ' - ' + end.substring(0,5);

            let vehicleHtml = shift ? `🚗 ${shift.vehicles?.brand || ''} (${shift.vehicles?.license_plate || 'N/A'})` : `⚠️ Sem Viatura (Livre)`;
            let statusHtml = shift ? `<span class="status-badge status-${shift.status}">${shift.status === 'assigned' ? 'Atribuído' : 'Em curso'}</span>` : `<span class="status-badge" style="background:#e2e8f0; color:#475569;">Aguarda Atribuição</span>`;
            let actionHtml = shift ? (shift.status === 'assigned' ? `<button class="start-btn" onclick="window.showStartShiftForm('${shift.id}')">🚦 Iniciar Turno</button>` : `<button class="end-btn" onclick="window.showEndShiftForm('${shift.id}')">🏁 Encerrar Turno</button>`) : '';

            return `
              <div class="card">
                <div class="shift-info">
                  <strong>${vehicleHtml}</strong>
                  <span>📅 ${dateLabel} | 🕐 ${timeLabel}</span>
                  ${statusHtml}
                </div>
                <div class="shift-actions">${actionHtml}</div>
                <div class="shift-form-container" id="form-container-${shift?.id || ''}" style="display:none; margin-top:12px; padding:15px; background:#f8fafc; border-radius:8px; border:1px solid #e2e8f0;"></div>
              </div>`;
          };

          activeAvails.forEach(avail => {
            const shift = activeShifts.find(s => s.date === avail.date && s.start_time === avail.start_time && s.end_time === avail.end_time);
            html += generateCard(avail, shift);
            if (shift) processedShiftIds.add(shift.id);
          });

          activeShifts.forEach(shift => { if (!processedShiftIds.has(shift.id)) html += generateCard(null, shift); });
          container.innerHTML = html;
        } catch (err) { console.error('Erro ao carregar horários:', err); }
      }

      window.showStartShiftForm = function(shiftId) {
        const formContainer = document.getElementById(`form-container-${shiftId}`);
        formContainer.style.display = 'block';
        formContainer.innerHTML = `
          <h4 style="color:#2563eb; margin-top:0;">🚦 Iniciar Turno</h4>
          <form id="start-form-${shiftId}" style="background:transparent; padding:0; border:none; box-shadow:none; margin-bottom:0;">
            <label>🔢 Km iniciais: <input type="number" id="start-km-${shiftId}" required placeholder="Ex: 12345"></label>
            <div class="photo-buttons" style="margin-top:10px;">
              <button type="button" class="edit-btn" onclick="document.getElementById('start-photo-${shiftId}').click()">📷 Foto / Galeria</button>
              <span id="start-photo-name-${shiftId}" class="photo-name"></span>
              <input type="file" id="start-photo-${shiftId}" accept="image/*" style="display:none;">
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
              <button type="submit" class="start-btn" style="flex:1;">✅ Confirmar</button>
              <button type="button" class="cancel-btn" style="flex:1;" onclick="document.getElementById('form-container-${shiftId}').style.display='none'">❌ Cancelar</button>
            </div>
          </form>
        `;
        document.getElementById(`start-photo-${shiftId}`).addEventListener('change', function() {
          const fileName = this.files[0] ? this.files[0].name : '';
          document.getElementById(`start-photo-name-${shiftId}`).textContent = fileName ? '📎 ' + fileName : '';
        });
        document.getElementById(`start-form-${shiftId}`).addEventListener('submit', async (e) => {
          e.preventDefault();
          try {
            const { data: currentShift } = await supabase.from('shifts').select('*').eq('id', shiftId).single();
            if (getLocalTodayString() < currentShift.date) { alert('⚠️ Não pode iniciar este turno antes da data programada.'); return; }
            
            const startKm = parseInt(document.getElementById(`start-km-${shiftId}`).value);
            const photoFile = document.getElementById(`start-photo-${shiftId}`).files[0];
            let startPhotoUrl = null;
            if (photoFile) {
              const compressed = await compressImage(photoFile);
              const path = `uploads/${Date.now()}.jpg`;
              await supabase.storage.from('fleet-photos').upload(path, compressed);
              const { data: urlData } = supabase.storage.from('fleet-photos').getPublicUrl(path);
              startPhotoUrl = urlData.publicUrl;
            }
            await supabase.from('shifts').update({ status: 'started' }).eq('id', shiftId);
            await supabase.from('shift_reports').insert({ shift_id: shiftId, driver_id: currentUser.id, start_km: startKm, start_photo_url: startPhotoUrl, company_id: currentCompanyId });
            alert('Turno iniciado com sucesso!'); loadMyShifts();
          } catch (err) { alert('Erro ao iniciar: ' + err.message); }
        });
      };

      window.showEndShiftForm = function(shiftId) {
        const formContainer = document.getElementById(`form-container-${shiftId}`);
        formContainer.style.display = 'block';
        formContainer.innerHTML = `
          <h4 style="color:#dc2626; margin-top:0;">🏁 Encerrar Turno</h4>
          <form id="end-form-${shiftId}" style="background:transparent; padding:0; border:none; box-shadow:none; margin-bottom:0;">
            <label>🔢 Km finais: <input type="number" id="end-km-${shiftId}" required></label>
            <label>⛽ Combustível (L): <input type="number" step="0.01" id="fuel-litres-${shiftId}"></label>
            <label>💰 Custo (€): <input type="number" step="0.01" id="fuel-cost-${shiftId}"></label>
            <label>💶 Faturado (€): <input type="number" step="0.01" id="invoiced-${shiftId}"></label>
            <div class="photo-buttons" style="margin-top:10px;">
              <button type="button" class="edit-btn" onclick="document.getElementById('end-photo-${shiftId}').click()">📷 Foto / Galeria</button>
              <span id="end-photo-name-${shiftId}" class="photo-name"></span>
              <input type="file" id="end-photo-${shiftId}" accept="image/*" style="display:none;">
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
              <button type="submit" class="end-btn" style="flex:1;">🏁 Encerrar</button>
              <button type="button" class="cancel-btn" style="flex:1;" onclick="document.getElementById('form-container-${shiftId}').style.display='none'">❌ Cancelar</button>
            </div>
          </form>
        `;
        document.getElementById(`end-photo-${shiftId}`).addEventListener('change', function() {
          const fileName = this.files[0] ? this.files[0].name : '';
          document.getElementById(`end-photo-name-${shiftId}`).textContent = fileName ? '📎 ' + fileName : '';
        });
        document.getElementById(`end-form-${shiftId}`).addEventListener('submit', async (e) => {
          e.preventDefault();
          try {
            const photoFile = document.getElementById(`end-photo-${shiftId}`).files[0];
            let endPhotoUrl = null;
            if (photoFile) {
              const compressed = await compressImage(photoFile);
              const path = `uploads/${Date.now()}.jpg`;
              await supabase.storage.from('fleet-photos').upload(path, compressed);
              const { data: urlData } = supabase.storage.from('fleet-photos').getPublicUrl(path);
              endPhotoUrl = urlData.publicUrl;
            }
            await supabase.from('shift_reports').update({
              end_km: parseInt(document.getElementById(`end-km-${shiftId}`).value),
              fuel_litres: document.getElementById(`fuel-litres-${shiftId}`).value || null,
              fuel_cost: document.getElementById(`fuel-cost-${shiftId}`).value || null,
              invoiced_amount: document.getElementById(`invoiced-${shiftId}`).value || null,
              end_photo_url: endPhotoUrl,
              closed: true,
              updated_at: new Date().toISOString()
            }).eq('shift_id', shiftId);
            await supabase.from('shifts').update({ status: 'completed' }).eq('id', shiftId);
            alert('Turno encerrado com sucesso!'); loadMyShifts(); loadHistory();
          } catch (err) { alert('Erro ao encerrar: ' + err.message); }
        });
      };

      // --- DISPONIBILIDADE ---
      async function loadAvailability() {
        try {
          const { data } = await supabase.from('driver_availability').select('*').eq('driver_id', currentUser.id).gte('date', getLocalTodayString()).order('date');
          availabilityPeriods = data || [];
          renderPeriodsList();
        } catch (err) { console.error(err); }
      }

      function renderPeriodsList() {
        const container = document.getElementById('periods-list');
        const replicateSection = document.getElementById('replicate-section');
        if (availabilityPeriods.length === 0) {
          container.innerHTML = '<p class="empty-msg">Nenhum período adicionado.</p>';
          replicateSection.style.display = 'none';
          return;
        }
        let html = '';
        const grouped = {};
        availabilityPeriods.forEach(p => { if (!grouped[p.date]) grouped[p.date] = []; grouped[p.date].push(p); });
        Object.keys(grouped).sort().forEach(date => {
          html += `<div style="margin-bottom:10px;"><strong>📅 ${date.split('-').reverse().join('/')}</strong>`;
          grouped[date].forEach(p => {
            html += `<div style="display:flex; align-items:center; gap:10px; margin:5px 0; padding:10px; background:#fff; border-radius:6px; border:1px solid #e2e8f0;">
              <span>🕐 ${p.start_time.substring(0,5)} - ${p.end_time.substring(0,5)}</span>
              <button class="delete-btn-sm" style="margin-left:auto;" onclick="window.removeAvail('${p.id}')">🗑️</button>
            </div>`;
          });
          html += '</div>';
        });
        container.innerHTML = html;
        replicateSection.style.display = 'block';
      }

      window.removeAvail = async (id) => { 
        if (id.length > 10) await supabase.from('driver_availability').delete().eq('id', id);
        else availabilityPeriods = availabilityPeriods.filter(p => p.id !== id);
        loadAvailability(); 
      };

      document.getElementById('add-period-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const date = document.getElementById('period-date').value;
        const start = document.getElementById('period-start').value;
        const end = document.getElementById('period-end').value;
        if (start >= end) { alert('A hora de início deve ser anterior à de fim.'); return; }
        availabilityPeriods.push({ id: Date.now().toString(), date, start_time: start, end_time: end });
        renderPeriodsList();
      });

      document.getElementById('save-availability-btn').addEventListener('click', async () => {
        const msg = document.getElementById('availability-msg');
        msg.textContent = 'A guardar...';
        try {
          await supabase.from('driver_availability').delete().eq('driver_id', currentUser.id).gte('date', getLocalTodayString());
          const inserts = availabilityPeriods.map(p => ({ 
            driver_id: currentUser.id, 
            date: p.date, 
            start_time: p.start_time, 
            end_time: p.end_time,
            company_id: currentCompanyId 
          }));
          if (inserts.length > 0) await supabase.from('driver_availability').insert(inserts);
          msg.textContent = '✅ Disponibilidade Guardada!'; msg.style.color = '#10b981';
          loadMyShifts();
        } catch (err) { msg.textContent = 'Erro ao guardar.'; msg.style.color = 'red'; }
      });

      document.getElementById('clear-availability-btn').addEventListener('click', () => {
        if (confirm('Limpar tudo?')) { availabilityPeriods = []; renderPeriodsList(); }
      });

      // --- HISTÓRICO ---
      async function loadHistory() {
        try {
          const { data: reports } = await supabase.from('shift_reports').select('*, shifts(date, vehicles(*))').eq('driver_id', currentUser.id).order('created_at', { ascending: false });
          const container = document.getElementById('history-list');
          if (!reports || reports.length === 0) { container.innerHTML = '<p class="empty-msg">Sem histórico de turnos.</p>'; return; }
          container.innerHTML = reports.map(r => `
            <div class="card history-card" style="border-left: 4px solid #10b981;">
              <div class="history-info">
                <strong>📅 ${r.shifts?.date.split('-').reverse().join('/')} | 🚗 ${r.shifts?.vehicles?.license_plate || 'N/A'}</strong>
                <span>🔢 Km: ${r.start_km || '?'} → ${r.end_km || '?'}</span>
                <span>💶 Faturado: ${r.invoiced_amount || '0'} €</span>
              </div>
            </div>
          `).join('');
        } catch (err) { console.error(err); }
      }

      // --- COMPRESSÃO DE IMAGEM ---
      function compressImage(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxWidth = 1200;
              let w = img.width, h = img.height;
              if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; }
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              canvas.toBlob(b => resolve(new File([b], `${Date.now()}.jpg`, { type: 'image/jpeg' })), 'image/jpeg', 0.7);
            };
          };
        });
      }
    })();
  </script>
</body>
</html>
