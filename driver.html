<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#007bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Frota Colaborador">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Colaborador - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 Painel do Colaborador</h1>
      <button id="logout-btn" class="logout-btn">Sair</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="my-shifts">📅 Os Meus Horários</button>
      <button class="tab" data-tab="availability">🕐 Disponibilidade</button>
      <button class="tab" data-tab="history">📋 Histórico</button>
    </div>

    <!-- Painel Horários -->
    <div id="my-shifts-panel" class="panel active">
      <h2>Horários de Hoje e Futuros</h2>
      <div id="shifts-today">A carregar...</div>
    </div>

    <!-- Painel Disponibilidade -->
    <div id="availability-panel" class="panel">
      <h2>Definir Disponibilidade</h2>
      <form id="availability-form">
        <label>📅 Data:
          <input type="date" id="av-date" required>
        </label>
        <div class="time-row">
          <label>🕐 Hora início:
            <input type="time" id="av-start" required>
          </label>
          <label>🕐 Hora fim:
            <input type="time" id="av-end" required>
          </label>
        </div>
        <button type="submit">➕ Adicionar Disponibilidade</button>
      </form>
      <h3>📋 Minhas Disponibilidades</h3>
      <div id="availability-list">A carregar...</div>
    </div>

    <!-- Painel Histórico -->
    <div id="history-panel" class="panel">
      <h2>Histórico de Turnos</h2>
      <div id="history-list">A carregar...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      const supabase = window.supabase;
      if (!supabase) {
        document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:20px;">Erro: Sistema não inicializado. Contacte o administrador.</h1>';
        return;
      }

      let currentUser = null;
      console.log('driver.html carregado com sucesso');

      // ---------- SERVICE WORKER ----------
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }

      // ---------- LOGOUT ----------
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
      });

      // ---------- TABS ----------
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          const panelId = tab.dataset.tab + '-panel';
          const panel = document.getElementById(panelId);
          if (panel) panel.classList.add('active');
          if (tab.dataset.tab === 'my-shifts') loadMyShifts();
          if (tab.dataset.tab === 'availability') loadAvailability();
          if (tab.dataset.tab === 'history') loadHistory();
        });
      });

      // ---------- INICIALIZAÇÃO ----------
      (async () => {
        try {
          const { data: { session }, error: sessionError } = await supabase.auth.getSession();
          if (sessionError || !session) {
            console.log('Sem sessão, redirecionando para login');
            window.location.href = 'index.html';
            return;
          }
          currentUser = session.user;
          console.log('Sessão obtida para user:', currentUser.id);

          const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('role, access_number, full_name')
            .eq('user_id', currentUser.id)
            .single();

          if (profileError || !profile || profile.role !== 'driver') {
            console.log('Acesso negado - não é motorista');
            await supabase.auth.signOut();
            window.location.href = 'index.html';
            return;
          }

          console.log('Colaborador autenticado:', profile.full_name);

          if (profile.access_number) {
            document.querySelector('.header h1').textContent += ' (Nº ' + profile.access_number + ')';
          }

          await loadMyShifts();
          await loadAvailability();
          await loadHistory();
          setupAvailabilityForm();
        } catch (err) {
          console.error('Erro na inicialização:', err);
          alert('Erro ao inicializar: ' + err.message);
        }
      })();

      // ---------- MEUS HORÁRIOS ----------
      async function loadMyShifts() {
        try {
          const today = new Date().toISOString().split('T')[0];
          console.log('Carregando horários a partir de:', today);
          
          const { data: shifts, error } = await supabase
            .from('shifts')
            .select('*, vehicles(*)')
            .eq('driver_id', currentUser.id)
            .gte('date', today)
            .order('date');

          if (error) throw error;

          const container = document.getElementById('shifts-today');
          container.innerHTML = '';

          if (!shifts || shifts.length === 0) {
            container.innerHTML = '<p class="empty-msg">Sem horários atribuídos para hoje e dias futuros.</p>';
            return;
          }

          console.log('Horários encontrados:', shifts.length);

          shifts.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = 'shift-' + s.id;

            const statusText = s.status === 'assigned' ? 'Atribuído' : 
                               s.status === 'started' ? 'Em andamento' : 'Concluído';

            card.innerHTML = `
              <div class="shift-info">
                <strong>🚗 ${s.vehicles?.brand || ''} ${s.vehicles?.model || ''} (${s.vehicles?.license_plate || 'N/A'})</strong>
                <span>📅 ${s.date} | 🕐 ${s.start_time} - ${s.end_time}</span>
                <span class="status-badge status-${s.status}">${statusText}</span>
              </div>
              <div class="shift-actions"></div>
              <div class="shift-form-container"></div>
            `;

            const actionsDiv = card.querySelector('.shift-actions');
            if (s.status === 'assigned') {
              const btn = document.createElement('button');
              btn.textContent = '🚦 Iniciar Turno';
              btn.className = 'start-btn';
              btn.addEventListener('click', () => showStartShiftForm(s.id));
              actionsDiv.appendChild(btn);
            } else if (s.status === 'started') {
              const btn = document.createElement('button');
              btn.textContent = '🏁 Encerrar Turno';
              btn.className = 'end-btn';
              btn.addEventListener('click', () => showEndShiftForm(s.id));
              actionsDiv.appendChild(btn);
            }

            container.appendChild(card);
          });
        } catch (err) {
          console.error('Erro ao carregar horários:', err);
          document.getElementById('shifts-today').innerHTML = '<p class="error-msg">Erro ao carregar horários: ' + err.message + '</p>';
        }
      }

      function showStartShiftForm(shiftId) {
        const formContainer = document.querySelector(`#shift-${shiftId} .shift-form-container`);
        formContainer.innerHTML = `
          <h4>🚦 Iniciar Turno</h4>
          <form id="start-form-${shiftId}" class="inline-form">
            <label>🔢 Km iniciais:
              <input type="number" id="start-km-${shiftId}" required placeholder="Ex: 12345">
            </label>
            <label class="file-label">📷 Foto inicial (opcional):
              <input type="file" id="start-photo-${shiftId}" accept="image/*" class="file-input">
            </label>
            <button type="submit">✅ Confirmar Início do Turno</button>
          </form>
        `;

        document.getElementById(`start-form-${shiftId}`).addEventListener('submit', async (e) => {
          e.preventDefault();
          try {
            const startKm = parseInt(document.getElementById(`start-km-${shiftId}`).value);
            if (!startKm || startKm < 0) {
              alert('Introduza um valor válido para os Km iniciais.');
              return;
            }

            const photoFile = document.getElementById(`start-photo-${shiftId}`).files[0];
            let startPhotoUrl = null;

            if (photoFile) {
              const compressed = await compressImage(photoFile);
              const path = `uploads/${Date.now()}_${photoFile.name}`;
              const { error: uploadError } = await supabase.storage.from('fleet-photos').upload(path, compressed);
              if (uploadError) throw uploadError;
              const { data: urlData } = supabase.storage.from('fleet-photos').getPublicUrl(path);
              startPhotoUrl = urlData.publicUrl;
            }

            const { error: shiftError } = await supabase.from('shifts').update({ status: 'started' }).eq('id', shiftId);
            if (shiftError) throw shiftError;

            const { error: reportError } = await supabase.from('shift_reports').insert({
              shift_id: shiftId,
              driver_id: currentUser.id,
              start_km: startKm,
              start_photo_url: startPhotoUrl
            });
            if (reportError) throw reportError;

            alert('Turno iniciado com sucesso!');
            loadMyShifts();
          } catch (err) {
            console.error('Erro ao iniciar turno:', err);
            alert('Erro ao iniciar turno: ' + err.message);
          }
        });
      }

      function showEndShiftForm(shiftId) {
        const formContainer = document.querySelector(`#shift-${shiftId} .shift-form-container`);
        formContainer.innerHTML = `
          <h4>🏁 Encerrar Turno</h4>
          <form id="end-form-${shiftId}" class="inline-form">
            <label>🔢 Km finais:
              <input type="number" id="end-km-${shiftId}" required placeholder="Ex: 12500">
            </label>
            <label>⛽ Combustível abastecido (litros):
              <input type="number" step="0.01" id="fuel-litres-${shiftId}" placeholder="Ex: 45.5">
            </label>
            <label>💰 Custo do combustível (€):
              <input type="number" step="0.01" id="fuel-cost-${shiftId}" placeholder="Ex: 78.90">
            </label>
            <label>💶 Valor faturado no turno (€):
              <input type="number" step="0.01" id="invoiced-${shiftId}" placeholder="Ex: 250.00">
            </label>
            <label>🧾 Número da fatura:
              <input type="text" id="invoice-num-${shiftId}" placeholder="Ex: FT-2024-001">
            </label>
            <label>📝 Notas do turno:
              <textarea id="notes-${shiftId}" rows="2" placeholder="Observações sobre o turno..."></textarea>
            </label>
            <label class="file-label">📷 Foto final (opcional):
              <input type="file" id="end-photo-${shiftId}" accept="image/*" class="file-input">
            </label>
            <button type="submit" class="end-btn">🏁 Encerrar Turno</button>
          </form>
        `;

        document.getElementById(`end-form-${shiftId}`).addEventListener('submit', async (e) => {
          e.preventDefault();
          try {
            const endKm = parseInt(document.getElementById(`end-km-${shiftId}`).value);
            if (!endKm || endKm < 0) {
              alert('Introduza um valor válido para os Km finais.');
              return;
            }

            const fuelLitres = document.getElementById(`fuel-litres-${shiftId}`).value || null;
            const fuelCost = document.getElementById(`fuel-cost-${shiftId}`).value || null;
            const invoiced = document.getElementById(`invoiced-${shiftId}`).value || null;
            const invoiceNum = document.getElementById(`invoice-num-${shiftId}`).value || null;
            const notes = document.getElementById(`notes-${shiftId}`).value || null;
            const photoFile = document.getElementById(`end-photo-${shiftId}`).files[0];
            let endPhotoUrl = null;

            if (photoFile) {
              const compressed = await compressImage(photoFile);
              const path = `uploads/${Date.now()}_${photoFile.name}`;
              const { error: uploadError } = await supabase.storage.from('fleet-photos').upload(path, compressed);
              if (uploadError) throw uploadError;
              const { data: urlData } = supabase.storage.from('fleet-photos').getPublicUrl(path);
              endPhotoUrl = urlData.publicUrl;
            }

            const updateData = {
              end_km: endKm,
              fuel_litres: fuelLitres ? parseFloat(fuelLitres) : null,
              fuel_cost: fuelCost ? parseFloat(fuelCost) : null,
              invoiced_amount: invoiced ? parseFloat(invoiced) : null,
              invoice_number: invoiceNum,
              notes: notes,
              closed: true,
              updated_at: new Date().toISOString()
            };
            if (endPhotoUrl) updateData.end_photo_url = endPhotoUrl;

            console.log('A encerrar turno. Dados:', updateData);

            const { error: reportError } = await supabase
              .from('shift_reports')
              .update(updateData)
              .eq('shift_id', shiftId);

            if (reportError) {
              console.error('Erro ao atualizar relatório:', reportError);
              throw reportError;
            }

            const { error: shiftError } = await supabase
              .from('shifts')
              .update({ status: 'completed' })
              .eq('id', shiftId);

            if (shiftError) {
              console.error('Erro ao atualizar shift:', shiftError);
              throw shiftError;
            }

            alert('Turno encerrado com sucesso!');
            loadMyShifts();
            loadHistory();
          } catch (err) {
            console.error('Erro ao encerrar turno:', err);
            alert('Erro ao encerrar turno: ' + err.message);
          }
        });
      }

      // ---------- DISPONIBILIDADE ----------
      async function loadAvailability() {
        try {
          const { data, error } = await supabase
            .from('driver_availability')
            .select('*')
            .eq('driver_id', currentUser.id)
            .order('date', { ascending: true });

          if (error) throw error;

          const container = document.getElementById('availability-list');
          if (!data || data.length === 0) {
            container.innerHTML = '<p class="empty-msg">Nenhuma disponibilidade registada. Adicione acima.</p>';
            return;
          }

          container.innerHTML = data.map(a => `
            <div class="card availability-card">
              <div class="availability-info">
                <span><strong>📅 ${a.date}</strong></span>
                <span>🕐 ${a.start_time} - ${a.end_time}</span>
              </div>
              <button class="delete-btn-sm" data-delete-availability="${a.id}">🗑️ Remover</button>
            </div>
          `).join('');

          container.querySelectorAll('[data-delete-availability]').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (confirm('Remover esta disponibilidade?')) {
                const { error: deleteError } = await supabase.from('driver_availability').delete().eq('id', btn.dataset.deleteAvailability);
                if (deleteError) {
                  alert('Erro ao remover: ' + deleteError.message);
                } else {
                  loadAvailability();
                }
              }
            });
          });
        } catch (err) {
          console.error('Erro ao carregar disponibilidade:', err);
          document.getElementById('availability-list').innerHTML = '<p class="error-msg">Erro: ' + err.message + '</p>';
        }
      }

      function setupAvailabilityForm() {
        document.getElementById('availability-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          try {
            const date = document.getElementById('av-date').value;
            const start = document.getElementById('av-start').value;
            const end = document.getElementById('av-end').value;

            if (!date || !start || !end) {
              alert('Preencha todos os campos.');
              return;
            }

            if (start >= end) {
              alert('A hora de início deve ser anterior à hora de fim.');
              return;
            }

            const { error } = await supabase.from('driver_availability').insert({
              driver_id: currentUser.id,
              date: date,
              start_time: start,
              end_time: end
            });

            if (error) {
              if (error.message.includes('duplicate key')) {
                alert('Já existe uma disponibilidade registada para esta data e hora.');
              } else {
                throw error;
              }
            } else {
              document.getElementById('availability-form').reset();
              await loadAvailability();
              alert('Disponibilidade adicionada com sucesso!');
            }
          } catch (err) {
            console.error('Erro ao adicionar disponibilidade:', err);
            alert('Erro: ' + err.message);
          }
        });
      }

      // ---------- HISTÓRICO ----------
      async function loadHistory() {
        try {
          const { data, error } = await supabase
            .from('shift_reports')
            .select('*, shifts(date, vehicles(*))')
            .eq('driver_id', currentUser.id)
            .order('created_at', { ascending: false });

          if (error) throw error;

          const container = document.getElementById('history-list');
          if (!data || data.length === 0) {
            container.innerHTML = '<p class="empty-msg">Nenhum turno no histórico.</p>';
            return;
          }

          container.innerHTML = data.map(r => {
            const distance = (r.start_km && r.end_km) ? (r.end_km - r.start_km) : null;
            
            return `
              <div class="card history-card">
                <div class="history-info">
                  <strong>📅 ${r.shifts?.date || 'N/A'} | 🚗 ${r.shifts?.vehicles?.license_plate || 'N/A'}</strong>
                  <span>🔢 Km: ${r.start_km || '?'} → ${r.end_km || '?'} ${distance ? '| Distância: ' + distance + ' km' : ''}</span>
                  <span>⛽ Combustível: ${r.fuel_litres || '0'} L | 💰 Custo: ${r.fuel_cost || '0'} €</span>
                  <span>💶 Faturado: ${r.invoiced_amount || '0'} € ${r.invoice_number ? '| 🧾 Fatura nº: ' + r.invoice_number : ''}</span>
                  <span>📝 Notas: ${r.notes || 'Nenhuma'}</span>
                  ${r.closed ? '<span><strong>📝 Notas pós-encerramento:</strong> ' + (r.notes_after_close || 'Nenhuma') + '</span>' : ''}
                  <div class="photo-links">
                    ${r.start_photo_url ? `<a href="${r.start_photo_url}" target="_blank" class="photo-link">📷 Foto inicial</a>` : ''}
                    ${r.end_photo_url ? `<a href="${r.end_photo_url}" target="_blank" class="photo-link">📷 Foto final</a>` : ''}
                  </div>
                </div>
                ${r.closed ? `<button class="add-note-btn" data-add-note="${r.id}">✏️ Adicionar/Editar nota pós-encerramento</button>` : ''}
              </div>
            `;
          }).join('');

          container.querySelectorAll('[data-add-note]').forEach(btn => {
            btn.addEventListener('click', async () => {
              const reportId = btn.dataset.addNote;
              const currentNote = data.find(r => r.id == reportId)?.notes_after_close || '';
              const note = prompt('Escreva ou edite a nota pós-encerramento:', currentNote);
              if (note !== null) {
                const { error: updateError } = await supabase.from('shift_reports').update({ notes_after_close: note }).eq('id', reportId);
                if (updateError) {
                  alert('Erro ao guardar nota: ' + updateError.message);
                } else {
                  await loadHistory();
                }
              }
            });
          });
        } catch (err) {
          console.error('Erro ao carregar histórico:', err);
          document.getElementById('history-list').innerHTML = '<p class="error-msg">Erro ao carregar histórico: ' + err.message + '</p>';
        }
      }

      // ---------- UTILITÁRIO: COMPRESSÃO DE IMAGEM ----------
      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxWidth = 1200;
              let width = img.width;
              let height = img.height;
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              canvas.toBlob((blob) => {
                if (!blob) {
                  reject(new Error('Falha ao comprimir imagem'));
                  return;
                }
                const fileName = `${Date.now()}_${file.name || 'foto.jpg'}`;
                const compressedFile = new File([blob], fileName, { type: 'image/jpeg' });
                resolve(compressedFile);
              }, 'image/jpeg', 0.7);
            };
            img.onerror = () => reject(new Error('Erro ao carregar imagem'));
          };
          reader.onerror = () => reject(new Error('Erro ao ler ficheiro'));
        });
      }
    })();
  </script>
</body>
</html>
