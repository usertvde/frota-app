<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#007bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Frota Colaborador">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Colaborador - Gestão de Frota</title>
  <!-- Nova Fonte Moderna -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Ponto 8: Padding bottom extra para evitar cortes no telemóvel -->
  <div class="container" style="padding-bottom: 120px;">
    <div class="header">
      <h1>🚚 Painel do Colaborador</h1>
      <button id="logout-btn" class="logout-btn">Sair</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="my-shifts">📅 Os Meus Horários</button>
      <button class="tab" data-tab="availability">🕐 Disponibilidade</button>
      <button class="tab" data-tab="history">📋 Histórico</button>
    </div>

    <!-- Painel Meus Horários -->
    <div id="my-shifts-panel" class="panel active">
      <h2>Horários de Hoje e Futuros</h2>
      <div id="shifts-today">A carregar...</div>
    </div>

    <!-- Painel Disponibilidade -->
    <div id="availability-panel" class="panel">
      <h2>Definir Disponibilidade</h2>

      <div style="background:#f8fafc; padding:20px; border-radius:12px; margin-bottom:25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
        <h3 style="margin-top:0; margin-bottom:15px; color:#2563eb; font-size: 18px;">➕ Adicionar Período</h3>
        <form id="add-period-form" style="background:#fff; padding:15px; border-radius:8px; border:1px solid #e2e8f0; box-shadow: none;">
          <label style="margin-bottom: 10px;">📅 Dia:
            <input type="date" id="period-date" required style="padding: 12px; font-size: 16px;">
          </label>
          <div class="time-row" style="margin-bottom: 15px; display: flex; gap: 10px;">
            <label style="flex: 1;">🕐 Início:
              <input type="time" id="period-start" required style="padding: 12px; font-size: 16px;">
            </label>
            <label style="flex: 1;">🕐 Fim:
              <input type="time" id="period-end" required style="padding: 12px; font-size: 16px;">
            </label>
          </div>
          <!-- Ponto 8: Botão bem visível -->
          <button type="submit" style="padding: 15px; font-size: 16px; font-weight: bold; margin-top: 10px; width: 100%;">✅ Definir Horário</button>
        </form>
      </div>

      <div style="background:#f8fafc; padding:20px; border-radius:12px; margin-bottom:15px; border: 1px solid #e2e8f0;">
        <h3 style="margin-top:0; font-size: 18px;">📋 Períodos Adicionados</h3>
        <div id="periods-list">
          <p class="empty-msg">Nenhum período adicionado.</p>
        </div>
        <div id="replicate-section" style="display:none; margin-top:20px; padding-top:20px; border-top:1px dashed #cbd5e1;">
          <h4 style="margin-top:0; color:#334155;">📅 Replicar para outros dias</h4>
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
            <label style="flex:1; min-width:120px;">De:
              <input type="date" id="replicate-from">
            </label>
            <label style="flex:1; min-width:120px;">Até:
              <input type="date" id="replicate-to">
            </label>
            <button id="replicate-btn" style="background:#0ea5e9; white-space:nowrap; padding: 12px 20px;">📅 Replicar</button>
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
        <button id="save-availability-btn" style="background:#10b981; flex: 1; min-width: 200px; padding: 15px; font-size: 16px;">💾 Guardar Disponibilidade</button>
        <button id="clear-availability-btn" style="background:#ef4444; flex: 1; min-width: 150px; padding: 15px; font-size: 16px;">🗑️ Limpar Tudo</button>
      </div>
      <p id="availability-msg" style="margin-top:15px; text-align: center; font-weight: bold;"></p>
    </div>

    <!-- Painel Histórico -->
    <div id="history-panel" class="panel">
      <h2>Histórico de Turnos</h2>
      <div id="history-list">A carregar...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      const supabase = window.supabase;
      if (!supabase) {
        document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:20px;">Erro: Sistema não inicializado. Contacte o administrador.</h1>';
        return;
      }

      let currentUser = null;
      let availabilityPeriods = [];
      console.log('driver.html carregado com sucesso');

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
      });

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          const panelId = tab.dataset.tab + '-panel';
          const panel = document.getElementById(panelId);
          if (panel) panel.classList.add('active');
          if (tab.dataset.tab === 'my-shifts') loadMyShifts();
          if (tab.dataset.tab === 'availability') loadAvailability();
          if (tab.dataset.tab === 'history') loadHistory();
        });
      });

      (async () => {
        try {
          const { data: { session }, error: sessionError } = await supabase.auth.getSession();
          if (sessionError || !session) {
            window.location.href = 'index.html';
            return;
          }
          currentUser = session.user;

          const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('role, access_number, full_name')
            .eq('user_id', currentUser.id)
            .single();

          if (profileError || !profile || profile.role !== 'driver') {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
            return;
          }

          if (profile.access_number) {
            document.querySelector('.header h1').textContent += ' (Nº ' + profile.access_number + ')';
          }

          await loadMyShifts();
          await loadHistory();
        } catch (err) {
          console.error('Erro na inicialização:', err);
        }
      })();

      // Funções auxiliares de datas (Pontos 6, 7 e 9)
      function getLocalTodayString() {
        const now = new Date();
        return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
      }

      function getLocalYesterdayString() {
        const y = new Date();
        y.setDate(y.getDate() - 1);
        return y.getFullYear() + '-' + String(y.getMonth()+1).padStart(2,'0') + '-' + String(y.getDate()).padStart(2,'0');
      }

      function getShiftEndDateTime(dateStr, startStr, endStr) {
        const end = new Date(`${dateStr}T${endStr}`);
        // Se a hora de fim for menor que a hora de início, o turno acaba no dia seguinte
        if (endStr < startStr) {
          end.setDate(end.getDate() + 1);
        }
        return end;
      }

      // =============================================
      // MEUS HORÁRIOS (Apenas Ativos/Futuros)
      // =============================================
      async function loadMyShifts() {
        try {
          const todayStr = getLocalTodayString();
          const yesterdayStr = getLocalYesterdayString();
          const now = new Date();

          // Disponibilidades a partir de hoje
          const { data: availabilities, error: availError } = await supabase
            .from('driver_availability')
            .select('*')
            .eq('driver_id', currentUser.id)
            .gte('date', todayStr)
            .order('date');
          if (availError) throw availError;

          // Turnos a partir de ontem (para apanhar turnos noturnos que acabam hoje)
          const { data: shifts, error: shiftsError } = await supabase
            .from('shifts')
            .select('*, vehicles(*)')
            .eq('driver_id', currentUser.id)
            .gte('date', yesterdayStr)
            .order('date');
          if (shiftsError) throw shiftsError;

          const container = document.getElementById('shifts-today');
          container.innerHTML = '';

          // Filtrar turnos ativos (Ponto 7 e 9)
          const activeShifts = (shifts || []).filter(s => {
            if (s.status === 'completed') return false; // Concluídos vão para o histórico
            if (s.status === 'started') return true; // Em curso ficam sempre visíveis
            
            const endDT = getShiftEndDateTime(s.date, s.start_time, s.end_time);
            return endDT >= now; // Se já passou a hora de fim e não foi iniciado, vai para o histórico
          });

          // Filtrar disponibilidades ativas
          const activeAvails = (availabilities || []).filter(a => {
            const endDT = getShiftEndDateTime(a.date, a.start_time, a.end_time);
            return endDT >= now;
          });

          if (activeAvails.length === 0 && activeShifts.length === 0) {
            container.innerHTML = '<p class="empty-msg">Sem horários ativos ou disponibilidades para hoje e dias futuros.</p>';
            return;
          }

          const processedShiftIds = new Set();
          let html = '';

          const generateCard = (avail, shift) => {
            const date = avail ? avail.date : shift.date;
            const start = avail ? avail.start_time : shift.start_time;
            const end = avail ? avail.end_time : shift.end_time;
            const dateLabel = date.split('-').reverse().join('/');
            const timeLabel = start.substring(0,5) + ' - ' + end.substring(0,5);

            let vehicleHtml = '';
            let statusHtml = '';
            let actionHtml = '';
            let cardId = '';
            let formContainerId = '';

            if (shift) {
              cardId = `shift-${shift.id}`;
              formContainerId = `form-container-${shift.id}`;
              vehicleHtml = `🚗 ${shift.vehicles?.brand || ''} ${shift.vehicles?.model || ''} (${shift.vehicles?.license_plate || 'N/A'})`;
              
              if (shift.status === 'assigned') {
                statusHtml = `<span class="status-badge status-assigned">Atribuído</span>`;
                actionHtml = `<button class="start-btn" onclick="window.showStartShiftForm('${shift.id}')">🚦 Iniciar Turno</button>`;
              } else if (shift.status === 'started') {
                statusHtml = `<span class="status-badge status-started">Em andamento</span>`;
                actionHtml = `<button class="end-btn" onclick="window.showEndShiftForm('${shift.id}')">🏁 Encerrar Turno</button>`;
              }
            } else {
              cardId = `avail-${avail.id}`;
              vehicleHtml = `⚠️ Sem Viatura (Livre)`;
              statusHtml = `<span class="status-badge" style="background:#e2e8f0; color:#475569;">Aguarda Atribuição</span>`;
              actionHtml = `<span style="font-size:13px; color:#64748b;">A aguardar planeamento do administrador.</span>`;
            }

            return `
              <div class="card" id="${cardId}">
                <div class="shift-info">
                  <strong>${vehicleHtml}</strong>
                  <span>📅 ${dateLabel} | 🕐 ${timeLabel}</span>
                  ${statusHtml}
                </div>
                <div class="shift-actions">${actionHtml}</div>
                <div class="shift-form-container" id="${formContainerId}" style="display:none; margin-top:12px; padding:15px; background:#f8fafc; border-radius:8px; border:1px solid #e2e8f0;"></div>
              </div>
            `;
          };

          activeAvails.forEach(avail => {
            const shift = activeShifts.find(s => s.date === avail.date && s.start_time === avail.start_time && s.end_time === avail.end_time);
            html += generateCard(avail, shift);
            if (shift) processedShiftIds.add(shift.id);
          });

          activeShifts.forEach(shift => {
            if (!processedShiftIds.has(shift.id)) {
              html += generateCard(null, shift);
            }
          });

          container.innerHTML = html;

        } catch (err) {
          console.error('Erro ao carregar horários:', err);
          document.getElementById('shifts-today').innerHTML = '<p class="error-msg">Erro ao carregar horários: ' + err.message + '</p>';
        }
      }

      window.showStartShiftForm = function(shiftId) {
        const formContainer = document.getElementById(`form-container-${shiftId}`);
        formContainer.style.display = 'block';
        formContainer.innerHTML = `
          <h4 style="color:#2563eb; margin-top:0;">🚦 Iniciar Turno</h4>
          <form id="start-form-${shiftId}" style="background:transparent; padding:0; border:none; box-shadow:none; margin-bottom:0;">
            <label>🔢 Km iniciais:
              <input type="number" id="start-km-${shiftId}" required placeholder="Ex: 12345">
            </label>
            <div class="photo-buttons" style="margin-top:10px;">
              <button type="button" class="edit-btn" onclick="document.getElementById('start-photo-${shiftId}').click()">
                📷 Foto / Galeria
              </button>
              <span id="start-photo-name-${shiftId}" class="photo-name"></span>
              <input type="file" id="start-photo-${shiftId}" accept="image/*" style="display:none;">
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
              <button type="submit" class="start-btn" style="flex:1;">✅ Confirmar</button>
              <button type="button" class="cancel-btn" style="flex:1;" onclick="document.getElementById('form-container-${shiftId}').style.display='none'">❌ Cancelar</button>
            </div>
          </form>
        `;

        document.getElementById(`start-photo-${shiftId}`).addEventListener('change', function() {
          const fileName = this.files[0] ? this.files[0].name : '';
          document.getElementById(`start-photo-name-${shiftId}`).textContent = fileName ? '📎 ' + fileName : '';
        });

        document.getElementById(`start-form-${shiftId}`).addEventListener('submit', async (e) => {
          e.preventDefault();
          try {
            const { data: currentShift, error: checkError } = await supabase.from('shifts').select('*').eq('id', shiftId).single();
            if (checkError) throw checkError;

            // Ponto 6: Validação de data de início
            const todayStr = getLocalTodayString();
            if (todayStr < currentShift.date) {
              alert(`⚠️ Não pode iniciar este turno hoje.\n\nO turno está programado apenas para o dia ${currentShift.date.split('-').reverse().join('/')}.`);
              return;
            }

            if (currentShift.status !== 'assigned') {
              alert('Este turno já não pode ser iniciado. Recarregue a página.');
              loadMyShifts();
              return;
            }

            const startKm = parseInt(document.getElementById(`start-km-${shiftId}`).value);
            const photoFile = document.getElementById(`start-photo-${shiftId}`).files[0];
            let startPhotoUrl = null;

            if (photoFile) {
              const compressed = await compressImage(photoFile);
              const path = `uploads/${Date.now()}_${photoFile.name}`;
              await supabase.storage.from('fleet-photos').upload(path, compressed);
              const { data: urlData } = supabase.storage.from('fleet-photos').getPublicUrl(path);
              startPhotoUrl = urlData.publicUrl;
            }

            await supabase.from('shifts').update({ status: 'started' }).eq('id', shiftId);
            await supabase.from('shift_reports').insert({
              shift_id: shiftId, driver_id: currentUser.id, start_km: startKm, start_photo_url: startPhotoUrl
            });

            alert('Turno iniciado com sucesso!');
            loadMyShifts();
          } catch (err) {
            alert('Erro ao iniciar turno: ' + err.message);
          }
        });
      };

      window.showEndShiftForm = function(shiftId) {
        supabase.from('shifts').select('*').eq('id', shiftId).single().then(({ data: currentShift, error: checkError }) => {
          if (checkError || !currentShift) return;

          const formContainer = document.getElementById(`form-container-${shiftId}`);
          formContainer.style.display = 'block';
          formContainer.innerHTML = `
            <h4 style="color:#dc2626; margin-top:0;">🏁 Encerrar Turno</h4>
            <form id="end-form-${shiftId}" style="background:transparent; padding:0; border:none; box-shadow:none; margin-bottom:0;">
              <label>🔢 Km finais: <input type="number" id="end-km-${shiftId}" required placeholder="Ex: 12500"></label>
              <label>⛽ Combustível (litros): <input type="number" step="0.01" id="fuel-litres-${shiftId}" placeholder="Ex: 45.5"></label>
              <label>💰 Custo combustível (€): <input type="number" step="0.01" id="fuel-cost-${shiftId}" placeholder="Ex: 78.90"></label>
              <label>💶 Valor faturado (€): <input type="number" step="0.01" id="invoiced-${shiftId}" placeholder="Ex: 250.00"></label>
              <label>🧾 Nº fatura: <input type="text" id="invoice-num-${shiftId}" placeholder="Ex: FT-2024-001"></label>
              <label>📝 Notas do turno: <textarea id="notes-${shiftId}" rows="2"></textarea></label>
              
              <div class="photo-buttons" style="margin-top:10px;">
                <button type="button" class="edit-btn" onclick="document.getElementById('end-photo-${shiftId}').click()">📷 Foto / Galeria</button>
                <span id="end-photo-name-${shiftId}" class="photo-name"></span>
                <input type="file" id="end-photo-${shiftId}" accept="image/*" style="display:none;">
              </div>
              
              <div style="display:flex; gap:10px; margin-top:15px;">
                <button type="submit" class="end-btn" style="flex:1;">🏁 Encerrar</button>
                <button type="button" class="cancel-btn" style="flex:1;" onclick="document.getElementById('form-container-${shiftId}').style.display='none'">❌ Cancelar</button>
              </div>
            </form>
          `;

          document.getElementById(`end-photo-${shiftId}`).addEventListener('change', function() {
            const fileName = this.files[0] ? this.files[0].name : '';
            document.getElementById(`end-photo-name-${shiftId}`).textContent = fileName ? '📎 ' + fileName : '';
          });

          document.getElementById(`end-form-${shiftId}`).addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Ponto 6: Validação de data de fim
            const todayStr = getLocalTodayString();
            if (todayStr < currentShift.date) {
              alert(`⚠️ Não pode concluir este turno hoje.\n\nO turno pertence ao dia ${currentShift.date.split('-').reverse().join('/')}.`);
              return;
            }

            try {
              const endKm = parseInt(document.getElementById(`end-km-${shiftId}`).value);
              const photoFile = document.getElementById(`end-photo-${shiftId}`).files[0];
              let endPhotoUrl = null;

              if (photoFile) {
                const compressed = await compressImage(photoFile);
                const path = `uploads/${Date.now()}_${photoFile.name}`;
                await supabase.storage.from('fleet-photos').upload(path, compressed);
                const { data: urlData } = supabase.storage.from('fleet-photos').getPublicUrl(path);
                endPhotoUrl = urlData.publicUrl;
              }

              await supabase.from('shift_reports').update({
                end_km: endKm,
                fuel_litres: document.getElementById(`fuel-litres-${shiftId}`).value || null,
                fuel_cost: document.getElementById(`fuel-cost-${shiftId}`).value || null,
                invoiced_amount: document.getElementById(`invoiced-${shiftId}`).value || null,
                invoice_number: document.getElementById(`invoice-num-${shiftId}`).value || null,
                notes: document.getElementById(`notes-${shiftId}`).value || null,
                end_photo_url: endPhotoUrl,
                closed: true,
                updated_at: new Date().toISOString()
              }).eq('shift_id', shiftId);

              await supabase.from('shifts').update({ status: 'completed' }).eq('id', shiftId);

              alert('Turno encerrado com sucesso!');
              loadMyShifts();
              loadHistory();
            } catch (err) {
              alert('Erro ao encerrar turno: ' + err.message);
            }
          });
        });
      };

      // =============================================
      // DISPONIBILIDADE
      // =============================================
      async function loadAvailability() {
        try {
          const { data: existing } = await supabase.from('driver_availability').select('*').eq('driver_id', currentUser.id).gte('date', getLocalTodayString()).order('date');
          availabilityPeriods = (existing || []).map(a => ({ date: a.date, start_time: a.start_time, end_time: a.end_time }));
          renderPeriodsList();
        } catch (err) { console.error('Erro:', err); }
      }

      function renderPeriodsList() {
        const container = document.getElementById('periods-list');
        const replicateSection = document.getElementById('replicate-section');

        if (availabilityPeriods.length === 0) {
          container.innerHTML = '<p class="empty-msg">Nenhum período adicionado.</p>';
          replicateSection.style.display = 'none';
        } else {
          const grouped = {};
          availabilityPeriods.forEach(p => {
            if (!grouped[p.date]) grouped[p.date] = [];
            grouped[p.date].push(p);
          });

          let html = '';
          Object.keys(grouped).sort().forEach(date => {
            const dateLabel = date.split('-').reverse().join('/');
            html += `<div style="margin-bottom:10px;"><strong>📅 ${dateLabel}</strong>`;
            grouped[date].forEach((p) => {
              html += `<div style="display:flex;align-items:center;gap:10px;margin:5px 0;padding:10px;background:#fff;border-radius:6px;border:1px solid #e2e8f0;">
                <span style="font-size:15px; font-weight:500;">🕐 ${p.start_time?.substring(0,5)} - ${p.end_time?.substring(0,5)}</span>
                <button class="delete-btn-sm" data-date="${p.date}" data-start="${p.start_time}" data-end="${p.end_time}" style="margin-left:auto; padding:6px 12px;">🗑️ Remover</button>
              </div>`;
            });
            html += '</div>';
          });
          container.innerHTML = html;
          replicateSection.style.display = 'block';

          container.querySelectorAll('.delete-btn-sm').forEach(btn => {
            btn.addEventListener('click', () => {
              const date = btn.dataset.date;
              const start = btn.dataset.start;
              const end = btn.dataset.end;
              availabilityPeriods = availabilityPeriods.filter(p => !(p.date === date && p.start_time === start && p.end_time === end));
              renderPeriodsList();
            });
          });
        }
      }

      document.getElementById('add-period-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const date = document.getElementById('period-date').value;
        const start = document.getElementById('period-start').value;
        const end = document.getElementById('period-end').value;

        if (!date || !start || !end) { alert('Preencha todos os campos.'); return; }
        if (start >= end) { alert('A hora de início deve ser anterior à hora de fim.'); return; }

        const duplicate = availabilityPeriods.find(p => p.date === date && p.start_time === start && p.end_time === end);
        if (duplicate) { alert('Este período já foi adicionado na lista abaixo.'); return; }

        availabilityPeriods.push({ date, start_time: start, end_time: end });
        availabilityPeriods.sort((a, b) => a.date.localeCompare(b.date) || a.start_time.localeCompare(b.start_time));
        renderPeriodsList();
        
        document.getElementById('period-start').value = '';
        document.getElementById('period-end').value = '';
        document.getElementById('period-start').focus();
      });

      document.getElementById('replicate-btn').addEventListener('click', () => {
        const from = document.getElementById('replicate-from').value;
        const to = document.getElementById('replicate-to').value;

        if (!from || !to) { alert('Selecione as datas de início e fim.'); return; }
        if (from > to) { alert('A data "De" deve ser anterior à data "Até".'); return; }
        if (availabilityPeriods.length === 0) { alert('Adicione pelo menos um período primeiro.'); return; }

        const periodsToReplicate = [...availabilityPeriods];
        const startDate = new Date(from);
        const endDate = new Date(to);

        for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
          const dateStr = d.toISOString().split('T')[0];
          periodsToReplicate.forEach(p => {
            const exists = availabilityPeriods.find(ap => ap.date === dateStr && ap.start_time === p.start_time && ap.end_time === p.end_time);
            if (!exists) {
              availabilityPeriods.push({ date: dateStr, start_time: p.start_time, end_time: p.end_time });
            }
          });
        }

        availabilityPeriods.sort((a, b) => a.date.localeCompare(b.date) || a.start_time.localeCompare(b.start_time));
        renderPeriodsList();
        alert('Períodos replicados com sucesso! Não se esqueça de clicar em "Guardar Disponibilidade".');
      });

      document.getElementById('save-availability-btn').addEventListener('click', async () => {
        try {
          const msg = document.getElementById('availability-msg');
          msg.textContent = 'A guardar...'; msg.style.color = '#64748b';

          await supabase.from('driver_availability').delete().eq('driver_id', currentUser.id).gte('date', getLocalTodayString());

          if (availabilityPeriods.length > 0) {
            const inserts = availabilityPeriods.map(p => ({
              driver_id: currentUser.id, date: p.date, start_time: p.start_time, end_time: p.end_time
            }));
            const { error } = await supabase.from('driver_availability').insert(inserts);
            if (error) throw error;
          }

          msg.textContent = 'Disponibilidade guardada com sucesso!'; msg.style.color = '#10b981';
          await loadMyShifts(); 
        } catch (err) {
          document.getElementById('availability-msg').textContent = 'Erro: ' + err.message;
          document.getElementById('availability-msg').style.color = '#ef4444';
        }
      });

      document.getElementById('clear-availability-btn').addEventListener('click', () => {
        if (confirm('Limpar todos os períodos adicionados?')) {
          availabilityPeriods = [];
          renderPeriodsList();
        }
      });

      // =============================================
      // HISTÓRICO (Concluídos + Expirados)
      // =============================================
      async function loadHistory() {
        try {
          // 1. Buscar relatórios (turnos concluídos ou iniciados)
          const { data: reports, error: repError } = await supabase
            .from('shift_reports')
            .select('*, shifts(date, start_time, end_time, vehicles(*))')
            .eq('driver_id', currentUser.id)
            .order('created_at', { ascending: false });
          if (repError) throw repError;

          // 2. Buscar turnos atribuídos que expiraram (Ponto 9)
          const { data: allShifts, error: shiftError } = await supabase
            .from('shifts')
            .select('*, vehicles(*)')
            .eq('driver_id', currentUser.id)
            .eq('status', 'assigned');
          if (shiftError) throw shiftError;

          const now = new Date();
          const expiredShifts = (allShifts || []).filter(s => {
            const endDT = getShiftEndDateTime(s.date, s.start_time, s.end_time);
            return endDT < now;
          });

          const container = document.getElementById('history-list');
          
          if ((!reports || reports.length === 0) && expiredShifts.length === 0) {
            container.innerHTML = '<p class="empty-msg">Nenhum turno no histórico.</p>';
            return;
          }

          let html = '';

          // Renderizar os Expirados primeiro (ou misturados, mas vamos colocar no topo para destaque)
          expiredShifts.forEach(s => {
            html += `
              <div class="card history-card" style="border-left: 4px solid #f59e0b; opacity: 0.8;">
                <div class="history-info">
                  <strong>📅 ${s.date.split('-').reverse().join('/')} | 🚗 ${s.vehicles?.license_plate || 'N/A'}</strong>
                  <span style="color: #b45309; font-weight: bold;">⚠️ Não Iniciado / Expirado</span>
                  <span>O turno das ${s.start_time.substring(0,5)} às ${s.end_time.substring(0,5)} terminou sem ser iniciado.</span>
                </div>
              </div>
            `;
          });

          // Renderizar os Concluídos
          (reports || []).forEach(r => {
            const distance = (r.start_km && r.end_km) ? (r.end_km - r.start_km) : null;
            html += `
              <div class="card history-card" style="border-left: 4px solid #10b981;">
                <div class="history-info">
                  <strong>📅 ${r.shifts?.date.split('-').reverse().join('/') || 'N/A'} | 🚗 ${r.shifts?.vehicles?.license_plate || 'N/A'}</strong>
                  <span>🔢 Km: ${r.start_km || '?'} → ${r.end_km || '?'} ${distance ? '| Distância: ' + distance + ' km' : ''}</span>
                  <span>⛽ Combustível: ${r.fuel_litres || '0'} L | 💰 Custo: ${r.fuel_cost || '0'} €</span>
                  <span>💶 Faturado: ${r.invoiced_amount || '0'} € ${r.invoice_number ? '| 🧾 Fatura nº: ' + r.invoice_number : ''}</span>
                  <span>📝 Notas: ${r.notes || 'Nenhuma'}</span>
                  ${r.closed ? '<span><strong>📝 Notas pós-encerramento:</strong> ' + (r.notes_after_close || 'Nenhuma') + '</span>' : ''}
                  <div class="photo-links">
                    ${r.start_photo_url ? `<a href="${r.start_photo_url}" target="_blank" class="photo-link">📷 Foto inicial</a>` : ''}
                    ${r.end_photo_url ? `<a href="${r.end_photo_url}" target="_blank" class="photo-link">📷 Foto final</a>` : ''}
                  </div>
                </div>
                ${r.closed ? `<button class="add-note-btn" data-add-note="${r.id}">✏️ Adicionar/Editar nota pós-encerramento</button>` : ''}
              </div>
            `;
          });

          container.innerHTML = html;

          container.querySelectorAll('[data-add-note]').forEach(btn => {
            btn.addEventListener('click', async () => {
              const reportId = btn.dataset.addNote;
              const currentNote = reports.find(r => r.id == reportId)?.notes_after_close || '';
              const note = prompt('Escreva ou edite a nota pós-encerramento:', currentNote);
              if (note !== null) {
                const { error: updateError } = await supabase.from('shift_reports').update({ notes_after_close: note }).eq('id', reportId);
                if (updateError) alert('Erro ao guardar nota: ' + updateError.message);
                else await loadHistory();
              }
            });
          });
        } catch (err) {
          document.getElementById('history-list').innerHTML = '<p class="error-msg">Erro ao carregar histórico: ' + err.message + '</p>';
        }
      }

      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxWidth = 1200;
              let width = img.width, height = img.height;
              if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
              canvas.width = width; canvas.height = height;
              canvas.getContext('2d').drawImage(img, 0, 0, width, height);
              canvas.toBlob((blob) => {
                if (!blob) { reject(new Error('Falha ao comprimir imagem')); return; }
                resolve(new File([blob], `${Date.now()}_${file.name || 'foto.jpg'}`, { type: 'image/jpeg' }));
              }, 'image/jpeg', 0.7);
            };
            img.onerror = () => reject(new Error('Erro ao carregar imagem'));
          };
          reader.onerror = () => reject(new Error('Erro ao ler ficheiro'));
        });
      }
    })();
  </script>
