<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colaborador - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 Painel do Colaborador</h1>
      <button id="logout-btn">Sair</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="my-shifts">Os Meus Horários</button>
      <button class="tab" data-tab="availability">Disponibilidade</button>
      <button class="tab" data-tab="history">Histórico</button>
    </div>

    <div id="my-shifts-panel" class="panel active">
      <h2>Horários de Hoje e Futuros</h2>
      <div id="shifts-today">A carregar...</div>
    </div>

    <div id="availability-panel" class="panel">
      <h2>Definir Disponibilidade</h2>
      <form id="availability-form">
        <label>Data: <input type="date" id="av-date" required></label>
        <label>Hora início: <input type="time" id="av-start" required></label>
        <label>Hora fim: <input type="time" id="av-end" required></label>
        <button type="submit">Adicionar</button>
      </form>
      <div id="availability-list">A carregar...</div>
    </div>

    <div id="history-panel" class="panel">
      <h2>Histórico de Turnos</h2>
      <div id="history-list">A carregar...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      const supabase = window.supabase;
      if (!supabase) {
        document.body.innerHTML = '<h1 style="color:red;">Erro: Supabase não carregou.</h1>';
        return;
      }
      let currentUser = null;

      console.log('driver.html iniciado');

      // ---------- LOGOUT ----------
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
      });

      // ---------- TABS ----------
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
          if (tab.dataset.tab === 'my-shifts') loadMyShifts();
          if (tab.dataset.tab === 'availability') loadAvailability();
          if (tab.dataset.tab === 'history') loadHistory();
        });
      });

      // ---------- INICIALIZAÇÃO ----------
      (async () => {
        try {
          const { data: { session }, error } = await supabase.auth.getSession();
          if (error || !session) {
            window.location.href = 'index.html';
            return;
          }
          currentUser = session.user;

          const { data: profile } = await supabase
            .from('profiles')
            .select('role, access_number')
            .eq('user_id', currentUser.id)
            .single();

          if (!profile || profile.role !== 'driver') {
            window.location.href = 'index.html';
            return;
          }

          // Mostrar o número de acesso no título
          if (profile.access_number) {
            document.querySelector('.header h1').textContent += ' (Nº ' + profile.access_number + ')';
          }

          console.log('Colaborador autenticado');
          loadMyShifts();
          loadAvailability();
          loadHistory();
          setupAvailabilityForm();
        } catch (err) {
          console.error('Erro inicial:', err);
        }
      })();

      // ---------- MEUS HORÁRIOS ----------
      async function loadMyShifts() {
        const today = new Date().toISOString().split('T')[0];
        const { data: shifts } = await supabase
          .from('shifts')
          .select('*, vehicles(*)')
          .eq('driver_id', currentUser.id)
          .gte('date', today)
          .order('date');

        const container = document.getElementById('shifts-today');
        if (!shifts || shifts.length === 0) {
          container.innerHTML = '<p>Sem horários atribuídos.</p>';
          return;
        }

        container.innerHTML = shifts.map(s => `
          <div class="card" id="shift-${s.id}">
            <strong>${s.vehicles?.brand} ${s.vehicles?.model} (${s.vehicles?.license_plate})</strong><br>
            ${s.date} ${s.start_time}-${s.end_time} [${s.status}]
            <div class="shift-actions">
              ${s.status === 'assigned' ? `<button data-start-shift="${s.id}">Iniciar Turno</button>` : ''}
              ${s.status === 'started' ? `<button data-end-shift="${s.id}">Encerrar Turno</button>` : ''}
              ${s.status === 'completed' ? '<em>Concluído</em>' : ''}
            </div>
            <div class="shift-form-container" id="form-${s.id}"></div>
          </div>
        `).join('');

        // Event listeners
        container.querySelectorAll('[data-start-shift]').forEach(btn => {
          btn.addEventListener('click', () => showStartShiftForm(btn.dataset.startShift));
        });
        container.querySelectorAll('[data-end-shift]').forEach(btn => {
          btn.addEventListener('click', () => showEndShiftForm(btn.dataset.endShift));
        });
      }

      function showStartShiftForm(shiftId) {
        const formContainer = document.getElementById(`form-${shiftId}`);
        formContainer.innerHTML = `
          <h4>Iniciar Turno</h4>
          <form id="start-form-${shiftId}">
            <label>Km iniciais: <input type="number" id="start-km-${shiftId}" required></label>
            <label>Foto inicial: <input type="file" id="start-photo-${shiftId}" accept="image/*"></label>
            <button type="submit">Confirmar Início</button>
          </form>
        `;
        document.getElementById(`start-form-${shiftId}`).addEventListener('submit', async (e) => {
          e.preventDefault();
          const startKm = document.getElementById(`start-km-${shiftId}`).value;
          const photoFile = document.getElementById(`start-photo-${shiftId}`).files[0];
          let startPhotoUrl = null;
          if (photoFile) {
            const compressed = await compressImage(photoFile);
            const path = `uploads/${Date.now()}_${photoFile.name}`;
            await supabase.storage.from('fleet-photos').upload(path, compressed);
            const { data } = supabase.storage.from('fleet-photos').getPublicUrl(path);
            startPhotoUrl = data.publicUrl;
          }
          await supabase.from('shifts').update({ status: 'started' }).eq('id', shiftId);
          await supabase.from('shift_reports').insert({
            shift_id: shiftId,
            driver_id: currentUser.id,
            start_km: parseInt(startKm),
            start_photo_url: startPhotoUrl
          });
          loadMyShifts();
        });
      }

      function showEndShiftForm(shiftId) {
        const formContainer = document.getElementById(`form-${shiftId}`);
        formContainer.innerHTML = `
          <h4>Encerrar Turno</h4>
          <form id="end-form-${shiftId}">
            <label>Km finais: <input type="number" id="end-km-${shiftId}" required></label>
            <label>Combustível (litros): <input type="number" step="0.01" id="fuel-litres-${shiftId}"></label>
            <label>Custo combustível (€): <input type="number" step="0.01" id="fuel-cost-${shiftId}"></label>
            <label>Valor faturado (€): <input type="number" step="0.01" id="invoiced-${shiftId}"></label>
            <label>Nº fatura: <input type="text" id="invoice-num-${shiftId}"></label>
            <label>Notas: <textarea id="notes-${shiftId}"></textarea></label>
            <label>Foto final: <input type="file" id="end-photo-${shiftId}" accept="image/*"></label>
            <button type="submit">Encerrar</button>
          </form>
        `;
        document.getElementById(`end-form-${shiftId}`).addEventListener('submit', async (e) => {
          e.preventDefault();
          const endKm = document.getElementById(`end-km-${shiftId}`).value;
          const fuelLitres = document.getElementById(`fuel-litres-${shiftId}`).value;
          const fuelCost = document.getElementById(`fuel-cost-${shiftId}`).value;
          const invoiced = document.getElementById(`invoiced-${shiftId}`).value;
          const invoiceNum = document.getElementById(`invoice-num-${shiftId}`).value;
          const notes = document.getElementById(`notes-${shiftId}`).value;
          const photoFile = document.getElementById(`end-photo-${shiftId}`).files[0];
          let endPhotoUrl = null;
          if (photoFile) {
            const compressed = await compressImage(photoFile);
            const path = `uploads/${Date.now()}_${photoFile.name}`;
            await supabase.storage.from('fleet-photos').upload(path, compressed);
            const { data } = supabase.storage.from('fleet-photos').getPublicUrl(path);
            endPhotoUrl = data.publicUrl;
          }
          await supabase.from('shift_reports').update({
            end_km: parseInt(endKm),
            fuel_litres: fuelLitres || null,
            fuel_cost: fuelCost || null,
            invoiced_amount: invoiced || null,
            invoice_number: invoiceNum || null,
            notes: notes || null,
            end_photo_url: endPhotoUrl,
            closed: true
          }).eq('shift_id', shiftId);
          await supabase.from('shifts').update({ status: 'completed' }).eq('id', shiftId);
          loadMyShifts();
        });
      }

      // ---------- DISPONIBILIDADE ----------
      async function loadAvailability() {
        const { data } = await supabase
          .from('driver_availability')
          .select('*')
          .eq('driver_id', currentUser.id)
          .order('date');

        const container = document.getElementById('availability-list');
        if (!data || data.length === 0) {
          container.innerHTML = '<p>Sem disponibilidade registada.</p>';
          return;
        }
        container.innerHTML = data.map(a => `
          <div class="card">
            ${a.date} das ${a.start_time} às ${a.end_time}
            <button data-delete-availability="${a.id}">Remover</button>
          </div>
        `).join('');
        container.querySelectorAll('[data-delete-availability]').forEach(btn => {
          btn.addEventListener('click', async () => {
            await supabase.from('driver_availability').delete().eq('id', btn.dataset.deleteAvailability);
            loadAvailability();
          });
        });
      }

      function setupAvailabilityForm() {
        document.getElementById('availability-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const date = document.getElementById('av-date').value;
          const start = document.getElementById('av-start').value;
          const end = document.getElementById('av-end').value;
          await supabase.from('driver_availability').insert({
            driver_id: currentUser.id,
            date,
            start_time: start,
            end_time: end
          });
          loadAvailability();
          e.target.reset();
        });
      }

      // ---------- HISTÓRICO ----------
      async function loadHistory() {
        const { data } = await supabase
          .from('shift_reports')
          .select('*, shifts(*, vehicles(*))')
          .eq('driver_id', currentUser.id)
          .order('created_at', { ascending: false });

        const container = document.getElementById('history-list');
        if (!data || data.length === 0) {
          container.innerHTML = '<p>Sem histórico de turnos.</p>';
          return;
        }
        container.innerHTML = data.map(r => `
          <div class="card">
            <strong>${r.shifts?.date} - ${r.shifts?.vehicles?.license_plate}</strong><br>
            Km: ${r.start_km || '-'} / ${r.end_km || '-'} |
            Combustível: ${r.fuel_litres || '-'}L (${r.fuel_cost || '-'}€)<br>
            Faturado: ${r.invoiced_amount || '-'}€ | Notas: ${r.notes || '-'}
            ${r.closed ? `<br><em>Notas pós-encerramento: ${r.notes_after_close || '-'}</em>` : ''}
            ${r.closed ? `<button data-add-note="${r.id}">Adicionar nota pós‑encerramento</button>` : ''}
          </div>
        `).join('');
        container.querySelectorAll('[data-add-note]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const reportId = btn.dataset.addNote;
            const note = prompt('Escreve a nota pós‑encerramento:');
            if (note !== null) {
              await supabase.from('shift_reports').update({ notes_after_close: note }).eq('id', reportId);
              loadHistory();
            }
          });
        });
      }

      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxWidth = 1200;
              let width = img.width, height = img.height;
              if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
              canvas.width = width; canvas.height = height;
              canvas.getContext('2d').drawImage(img, 0, 0, width, height);
              canvas.toBlob(blob => {
                if (!blob) reject(new Error('Falha'));
                else resolve(new File([blob], file.name || 'foto.jpg', { type: 'image/jpeg' }));
              }, 'image/jpeg', 0.7);
            };
          };
          reader.onerror = reject;
        });
      }
    })();
  </script>
</body>
</html>
