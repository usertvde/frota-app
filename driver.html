<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colaborador - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 Painel do Colaborador</h1>
      <button id="logout-btn">Sair</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="my-shifts">Os Meus Horários</button>
      <button class="tab" data-tab="availability">Disponibilidade</button>
      <button class="tab" data-tab="history">Histórico</button>
    </div>

    <div id="my-shifts-panel" class="panel active">
      <h2>Horários de Hoje e Futuros</h2>
      <div id="shifts-today"></div>
    </div>

    <div id="availability-panel" class="panel">
      <h2>Definir Disponibilidade</h2>
      <form id="availability-form">
        <label>Data: <input type="date" id="av-date" required></label>
        <label>Hora início: <input type="time" id="av-start" required></label>
        <label>Hora fim: <input type="time" id="av-end" required></label>
        <button type="submit">Adicionar</button>
      </form>
      <div id="availability-list"></div>
    </div>

    <div id="history-panel" class="panel">
      <h2>Histórico de Turnos</h2>
      <div id="history-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    // supabase is accessed via window.supabase (defined in supabaseClient.js)
    if (!window.supabase) {
      console.error('Supabase client not initialized. Please check supabaseClient.js');
      window.location.href = 'index.html';
    }
    let currentUser = null;

    (async () => {
      try {
        const { data: { session }, error: sessionError } = await window.supabase.auth.getSession();
        if (sessionError) {
          console.error('Erro ao obter sessão:', sessionError);
          window.location.href = 'index.html';
          return;
        }
        if (!session) { 
          console.log('Sem sessão, redirecionando');
          window.location.href = 'index.html'; 
          return; 
        }
        currentUser = session.user;

        const { data: profile, error: profileError } = await window.supabase.from('profiles').select('role').eq('user_id', currentUser.id).single();
        if (profileError || !profile || profile.role !== 'driver') { 
          console.error('Acesso negado. Profile:', profile, 'Error:', profileError);
          window.location.href = 'index.html'; 
          return; 
        }

        setupTabs();
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await window.supabase.auth.signOut();
          window.location.href = 'index.html';
        });

        loadMyShifts();
        loadAvailability();
        loadHistory();
        setupAvailabilityForm();
      } catch (err) {
        console.error('Erro durante inicialização:', err);
        window.location.href = 'index.html';
      }
    })();

    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
          if (tab.dataset.tab === 'my-shifts') loadMyShifts();
          if (tab.dataset.tab === 'availability') loadAvailability();
          if (tab.dataset.tab === 'history') loadHistory();
        });
      });
    }

    async function loadMyShifts() {
      try {
        const today = new Date().toISOString().split('T')[0];
        const { data: shifts, error } = await window.supabase.from('shifts').select('*, vehicles(*)').eq('driver_id', currentUser.id).gte('shift_date', today).order('shift_date');
        if (error) throw error;
        const container = document.getElementById('shifts-today');
        if (!shifts || !shifts.length) {
          container.innerHTML = '<p>Sem horários atribuídos.</p>';
          return;
        }
      container.innerHTML = shifts.map(s => {
        const isStarted = s.status === 'started';
        const isCompleted = s.status === 'completed';
        let actionHtml = '';
        if (!isStarted && !isCompleted) {
          actionHtml = `<button onclick="startShift(${s.id})">Iniciar Turno</button>`;
        } else if (isStarted) {
          actionHtml = `<button onclick="endShift(${s.id})">Encerrar Turno</button>`;
        } else {
          actionHtml = `<em>Concluído</em>`;
        }
        return `<div class="card">
          <strong>${s.vehicles?.brand} ${s.vehicles?.model} (${s.vehicles?.plate})</strong><br>
          ${s.shift_date} ${s.start_time}-${s.end_time} [${s.status}]
          ${actionHtml}
        </div>`;
      }).join('');
      } catch (err) {
        console.error('Erro ao carregar horários:', err);
        document.getElementById('shifts-today').innerHTML = '<p>Erro ao carregar horários: ' + err.message + '</p>';
      }
    }

    window.startShift = async (shiftId) => {
      try {
        await window.supabase.from('shifts').update({ status: 'started' }).eq('id', shiftId);
        // Criar relatório vazio
        await window.supabase.from('shift_reports').insert({ shift_id: shiftId, driver_id: currentUser.id });
        await loadMyShifts();
      } catch (err) {
        console.error('Erro ao iniciar turno:', err);
        alert('Erro ao iniciar turno: ' + err.message);
      }
    };

    window.endShift = async (shiftId) => {
      // Mostrar formulário de encerramento
      const report = await window.supabase.from('shift_reports').select('*').eq('shift_id', shiftId).single();
      const formHtml = `
        <h3>Encerrar Turno</h3>
        <form id="end-shift-form">
          <label>Km finais: <input type="number" id="end-km" required></label>
          <label>Combustível (litros): <input type="number" step="0.01" id="fuel-litres"></label>
          <label>Custo combustível (€): <input type="number" step="0.01" id="fuel-cost"></label>
          <label>Valor faturado (€): <input type="number" step="0.01" id="invoiced"></label>
          <label>Nº fatura: <input type="text" id="invoice-num"></label>
          <label>Notas: <textarea id="notes"></textarea></label>
          <label>Foto final: <input type="file" id="end-photo" accept="image/*"></label>
          <button type="submit">Encerrar</button>
        </form>
      `;
      const div = document.createElement('div');
      div.innerHTML = formHtml;
      document.getElementById('shifts-today').appendChild(div);
      document.getElementById('end-shift-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const endKm = document.getElementById('end-km').value;
        const fuelLitres = document.getElementById('fuel-litres').value;
        const fuelCost = document.getElementById('fuel-cost').value;
        const invoiced = document.getElementById('invoiced').value;
        const invoiceNum = document.getElementById('invoice-num').value;
        const notes = document.getElementById('notes').value;
        const photoFile = document.getElementById('end-photo').files[0];
        let endPhotoUrl = null;
        if (photoFile) {
          const compressed = await compressImage(photoFile);
          const path = `uploads/${Date.now()}_${photoFile.name}`;
          await window.supabase.storage.from('fleet-photos').upload(path, compressed);
          const { data } = window.supabase.storage.from('fleet-photos').getPublicUrl(path);
          endPhotoUrl = data.publicUrl;
        }
        await window.supabase.from('shift_reports').update({
          end_km: parseInt(endKm),
          fuel_litres: fuelLitres || null,
          fuel_cost: fuelCost || null,
          invoiced_amount: invoiced || null,
          invoice_number: invoiceNum || null,
          notes: notes || null,
          end_photo_url: endPhotoUrl,
          closed: true
        }).eq('shift_id', shiftId);
        await window.supabase.from('shifts').update({ status: 'completed' }).eq('id', shiftId);
        loadMyShifts();
      });
    };

    // Disponibilidade
    async function loadAvailability() {
      try {
        const { data, error } = await window.supabase.from('driver_availability').select('*').eq('driver_id', currentUser.id).order('date');
        if (error) throw error;
        if (!data || !data.length) {
          document.getElementById('availability-list').innerHTML = '<p>Sem disponibilidade registada.</p>';
          return;
        }
        document.getElementById('availability-list').innerHTML = data.map(a => `
          <div class="card">
            ${a.date} das ${a.start_time} às ${a.end_time}
            <button onclick="deleteAvailability(${a.id})">Remover</button>
          </div>
        `).join('');
      } catch (err) {
        console.error('Erro ao carregar disponibilidade:', err);
        document.getElementById('availability-list').innerHTML = '<p>Erro ao carregar disponibilidade: ' + err.message + '</p>';
      }
    }

    window.deleteAvailability = async (id) => {
      try {
        const { error } = await window.supabase.from('driver_availability').delete().eq('id', id);
        if (error) throw error;
        await loadAvailability();
      } catch (err) {
        console.error('Erro ao eliminar disponibilidade:', err);
        alert('Erro: ' + err.message);
      }
    };

    function setupAvailabilityForm() {
      document.getElementById('availability-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          const date = document.getElementById('av-date').value;
          const start = document.getElementById('av-start').value;
          const end = document.getElementById('av-end').value;
          const { error } = await window.supabase.from('driver_availability').insert({ driver_id: currentUser.id, date, start_time: start, end_time: end });
          if (error) throw error;
          await loadAvailability();
          e.target.reset();
        } catch (err) {
          console.error('Erro ao adicionar disponibilidade:', err);
          alert('Erro: ' + err.message);
        }
      });
    }

    // Histórico
    async function loadHistory() {
      try {
        const { data, error } = await window.supabase.from('shift_reports').select('*, shifts(*, vehicles(*))').eq('driver_id', currentUser.id).order('created_at', { ascending: false });
        if (error) throw error;
        if (!data || !data.length) {
          document.getElementById('history-list').innerHTML = '<p>Sem histórico de turnos.</p>';
          return;
        }
        document.getElementById('history-list').innerHTML = data.map(r => `
          <div class="card">
            <strong>${r.shifts?.shift_date} - ${r.shifts?.vehicles?.plate}</strong><br>
            Km: ${r.start_km || '-'} / ${r.end_km || '-'} | Combustível: ${r.fuel_litres || '-'}L (${r.fuel_cost || '-'}€)<br>
            Faturado: ${r.invoiced_amount || '-'}€ | Notas: ${r.notes || '-'}
            ${r.closed ? `<br><em>Notas pós-encerramento: ${r.notes_after_close || '-'}</em>` : ''}
          </div>
        `).join('');
      } catch (err) {
        console.error('Erro ao carregar histórico:', err);
        document.getElementById('history-list').innerHTML = '<p>Erro ao carregar histórico: ' + err.message + '</p>';
      }
    }

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxWidth = 1200;
            let width = img.width, height = img.height;
            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            canvas.toBlob(blob => {
              if (!blob) reject(new Error('Falha'));
              else resolve(new File([blob], file.name || 'foto.jpg', { type: 'image/jpeg' }));
            }, 'image/jpeg', 0.7);
          };
        };
        reader.onerror = reject;
      });
    }
  </script>
</body>
</html>
