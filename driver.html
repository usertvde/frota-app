<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#007bff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Frota Colaborador">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Colaborador - Gestão de Frota</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚚 Painel do Colaborador</h1>
      <button id="logout-btn" class="logout-btn">Sair</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="my-shifts">📅 Os Meus Horários</button>
      <button class="tab" data-tab="availability">🕐 Disponibilidade</button>
      <button class="tab" data-tab="history">📋 Histórico</button>
    </div>

    <div id="my-shifts-panel" class="panel active">
      <h2>Horários de Hoje e Futuros</h2>
      <div id="shifts-today">A carregar...</div>
    </div>

    <div id="availability-panel" class="panel">
      <h2>Definir Disponibilidade</h2>

      <div style="background:#f8f9fa;padding:15px;border-radius:8px;margin-bottom:15px;">
        <h3 style="margin-top:0;">➕ Adicionar Período</h3>
        <form id="add-period-form" style="background:#fff;">
          <label>📅 Dia:
            <input type="date" id="period-date" required>
          </label>
          <div class="time-row">
            <label>🕐 Hora início:
              <input type="time" id="period-start" required>
            </label>
            <label>🕐 Hora fim:
              <input type="time" id="period-end" required>
            </label>
          </div>
          <button type="submit">Adicionar Período</button>
        </form>
      </div>

      <div style="background:#f8f9fa;padding:15px;border-radius:8px;margin-bottom:15px;">
        <h3 style="margin-top:0;">📋 Períodos Adicionados</h3>
        <div id="periods-list">
          <p class="empty-msg">Nenhum período adicionado.</p>
        </div>
        <div id="replicate-section" style="display:none;margin-top:15px;padding-top:15px;border-top:1px dashed #ccc;">
          <h4>📅 Replicar para outros dias</h4>
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
            <label style="flex:1;min-width:120px;">De:
              <input type="date" id="replicate-from">
            </label>
            <label style="flex:1;min-width:120px;">Até:
              <input type="date" id="replicate-to">
            </label>
            <button id="replicate-btn" style="background:#17a2b8;white-space:nowrap;">📅 Replicar</button>
          </div>
        </div>
      </div>

      <button id="save-availability-btn" style="background:#28a745;">💾 Guardar Disponibilidade</button>
      <button id="clear-availability-btn" style="background:#dc3545;margin-left:10px;">🗑️ Limpar Tudo</button>
      <p id="availability-msg" style="margin-top:10px;"></p>
    </div>

    <div id="history-panel" class="panel">
      <h2>Histórico de Turnos</h2>
      <div id="history-list">A carregar...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script>
    (function() {
      const supabase = window.supabase;
      if (!supabase) {
        document.body.innerHTML = '<h1 style="color:red;text-align:center;padding:20px;">Erro: Sistema não inicializado. Contacte o administrador.</h1>';
        return;
      }

      let currentUser = null;
      let availabilityPeriods = [];
      console.log('driver.html carregado com sucesso');

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }

      document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
      });

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          const panelId = tab.dataset.tab + '-panel';
          const panel = document.getElementById(panelId);
          if (panel) panel.classList.add('active');
          if (tab.dataset.tab === 'my-shifts') loadMyShifts();
          if (tab.dataset.tab === 'availability') loadAvailability();
          if (tab.dataset.tab === 'history') loadHistory();
        });
      });

      (async () => {
        try {
          const { data: { session }, error: sessionError } = await supabase.auth.getSession();
          if (sessionError || !session) {
            console.log('Sem sessão, redirecionando para login');
            window.location.href = 'index.html';
            return;
          }
          currentUser = session.user;
          console.log('Sessão obtida para user:', currentUser.id);

          const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('role, access_number, full_name')
            .eq('user_id', currentUser.id)
            .single();

          if (profileError || !profile || profile.role !== 'driver') {
            console.log('Acesso negado - não é motorista');
            await supabase.auth.signOut();
            window.location.href = 'index.html';
            return;
          }

          console.log('Colaborador autenticado:', profile.full_name);

          if (profile.access_number) {
            document.querySelector('.header h1').textContent += ' (Nº ' + profile.access_number + ')';
          }

          await loadMyShifts();
          await loadHistory();
        } catch (err) {
          console.error('Erro na inicialização:', err);
          alert('Erro ao inicializar: ' + err.message);
        }
      })();

      // =============================================
      // MEUS HORÁRIOS (apenas assigned e started)
      // =============================================
      async function loadMyShifts() {
        try {
          const today = new Date().toISOString().split('T')[0];
          console.log('Carregando horários a partir de:', today);

          const { data: shifts, error } = await supabase
            .from('shifts')
            .select('*, vehicles(*)')
            .eq('driver_id', currentUser.id)
            .in('status', ['assigned', 'started'])
            .gte('date', today)
            .order('date');

          if (error) throw error;

          const container = document.getElementById('shifts-today');
          container.innerHTML = '';

          if (!shifts || shifts.length === 0) {
            container.innerHTML = '<p class="empty-msg">Sem horários ativos para hoje e dias futuros.</p>';
            return;
          }

          console.log('Horários ativos encontrados:', shifts.length);

          shifts.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = 'shift-' + s.id;

            const statusText = s.status === 'assigned' ? 'Atribuído' : 'Em andamento';

            card.innerHTML = `
              <div class="shift-info">
                <strong>🚗 ${s.vehicles?.brand || ''} ${s.vehicles?.model || ''} (${s.vehicles?.license_plate || 'N/A'})</strong>
                <span>📅 ${s.date} | 🕐 ${s.start_time?.substring(0,5)} - ${s.end_time?.substring(0,5)}</span>
                <span class="status-badge status-${s.status}">${statusText}</span>
              </div>
              <div class="shift-actions"></div>
              <div class="shift-form-container"></div>
            `;

            const actionsDiv = card.querySelector('.shift-actions');
            if (s.status === 'assigned') {
              const btn = document.createElement('button');
              btn.textContent = '🚦 Iniciar Turno';
              btn.className = 'start-btn';
              btn.addEventListener('click', () => showStartShiftForm(s.id));
              actionsDiv.appendChild(btn);
            } else if (s.status === 'started') {
              const btn = document.createElement('button');
              btn.textContent = '🏁 Encerrar Turno';
              btn.className = 'end-btn';
              btn.addEventListener('click', () => showEndShiftForm(s.id));
              actionsDiv.appendChild(btn);
            }

            container.appendChild(card);
          });
        } catch (err) {
          console.error('Erro ao carregar horários:', err);
          document.getElementById('shifts-today').innerHTML = '<p class="error-msg">Erro ao carregar horários: ' + err.message + '</p>';
        }
      }

      function showStartShiftForm(shiftId) {
        const formContainer = document.querySelector(`#shift-${shiftId} .shift-form-container`);
        formContainer.innerHTML = `
          <h4>🚦 Iniciar Turno</h4>
          <form id="start-form-${shiftId}" class="inline-form">
            <label>🔢 Km iniciais:
              <input type="number" id="start-km-${shiftId}" required placeholder="Ex: 12345">
            </label>
            <div class="photo-buttons">
              <button type="button" class="camera-btn" onclick="document.getElementById('start-photo-${shiftId}').click()">
                📷 Tirar Foto Inicial
              </button>
              <span id="start-photo-name-${shiftId}" class="photo-name"></span>
              <input type="file" id="start-photo-${shiftId}" accept="image/*" capture="environment" style="display:none;">
            </div>
            <button type="submit">✅ Confirmar Início do Turno</button>
          </form>
        `;

        document.getElementById(`start-photo-${shiftId}`).addEventListener('change', function() {
          const fileName = this.files[0] ? this.files[0].name : '';
          document.getElementById(`start-photo-name-${shiftId}`).textContent = fileName ? '📎 ' + fileName : '';
        });

        document.getElementById(`start-form-${shiftId}`).addEventListener('submit', async (e) => {
          e.preventDefault();
          try {
            const startKm = parseInt(document.getElementById(`start-km-${shiftId}`).value);
            if (!startKm || startKm < 0) {
              alert('Introduza um valor válido para os Km iniciais.');
              return;
            }

            const { data: currentShift, error: checkError } = await supabase
              .from('shifts')
              .select('status')
              .eq('id', shiftId)
              .single();

            if (checkError) throw checkError;
            if (currentShift.status !== 'assigned') {
              alert('Este turno já não pode ser iniciado. Recarregue a página.');
              loadMyShifts();
              return;
            }

            const photoFile = document.getElementById(`start-photo-${shiftId}`).files[0];
            let startPhotoUrl = null;

            if (photoFile) {
              const compressed = await compressImage(photoFile);
              const path = `uploads/${Date.now()}_${photoFile.name}`;
              const { error: uploadError } = await supabase.storage.from('fleet-photos').upload(path, compressed);
              if (uploadError) throw uploadError;
              const { data: urlData } = supabase.storage.from('fleet-photos').getPublicUrl(path);
              startPhotoUrl = urlData.publicUrl;
            }

            const { error: shiftError } = await supabase.from('shifts').update({ status: 'started' }).eq('id', shiftId);
            if (shiftError) throw shiftError;

            const { error: reportError } = await supabase.from('shift_reports').insert({
              shift_id: shiftId,
              driver_id: currentUser.id,
              start_km: startKm,
              start_photo_url: startPhotoUrl
            });
            if (reportError) throw reportError;

            alert('Turno iniciado com sucesso!');
            loadMyShifts();
          } catch (err) {
            console.error('Erro ao iniciar turno:', err);
            alert('Erro ao iniciar turno: ' + err.message);
          }
        });
      }

      function showEndShiftForm(shiftId) {
        supabase
          .from('shifts')
          .select('status')
          .eq('id', shiftId)
          .single()
          .then(({ data: currentShift, error: checkError }) => {
            if (checkError || !currentShift) {
              alert('Erro ao verificar turno. Recarregue a página.');
              loadMyShifts();
              return;
            }

            if (currentShift.status !== 'started') {
              alert('Este turno já foi encerrado. A lista será atualizada.');
              loadMyShifts();
              return;
            }

            const formContainer = document.querySelector(`#shift-${shiftId} .shift-form-container`);
            formContainer.innerHTML = `
              <h4>🏁 Encerrar Turno</h4>
              <form id="end-form-${shiftId}" class="inline-form">
                <label>🔢 Km finais:
                  <input type="number" id="end-km-${shiftId}" required placeholder="Ex: 12500">
                </label>
                <label>⛽ Combustível abastecido (litros):
                  <input type="number" step="0.01" id="fuel-litres-${shiftId}" placeholder="Ex: 45.5">
                </label>
                <label>💰 Custo do combustível (€):
                  <input type="number" step="0.01" id="fuel-cost-${shiftId}" placeholder="Ex: 78.90">
                </label>
                <label>💶 Valor faturado no turno (€):
                  <input type="number" step="0.01" id="invoiced-${shiftId}" placeholder="Ex: 250.00">
                </label>
                <label>🧾 Número da fatura:
                  <input type="text" id="invoice-num-${shiftId}" placeholder="Ex: FT-2024-001">
                </label>
                <label>📝 Notas do turno:
                  <textarea id="notes-${shiftId}" rows="2" placeholder="Observações sobre o turno..."></textarea>
                </label>
                <div class="photo-buttons">
                  <button type="button" class="camera-btn" onclick="document.getElementById('end-photo-${shiftId}').click()">
                    📷 Tirar Foto Final
                  </button>
                  <span id="end-photo-name-${shiftId}" class="photo-name"></span>
                  <input type="file" id="end-photo-${shiftId}" accept="image/*" capture="environment" style="display:none;">
                </div>
                <button type="submit" class="end-btn">🏁 Encerrar Turno</button>
              </form>
            `;

            document.getElementById(`end-photo-${shiftId}`).addEventListener('change', function() {
              const fileName = this.files[0] ? this.files[0].name : '';
              document.getElementById(`end-photo-name-${shiftId}`).textContent = fileName ? '📎 ' + fileName : '';
            });

            document.getElementById(`end-form-${shiftId}`).addEventListener('submit', async (e) => {
              e.preventDefault();
              await submitEndShift(shiftId);
            });
          });
      }

      async function submitEndShift(shiftId) {
        try {
          const { data: currentShift, error: checkError } = await supabase
            .from('shifts')
            .select('status')
            .eq('id', shiftId)
            .single();

          if (checkError) throw checkError;
          if (currentShift.status !== 'started') {
            alert('Este turno já foi encerrado por outra ação. A lista será atualizada.');
            loadMyShifts();
            return;
          }

          const endKm = parseInt(document.getElementById(`end-km-${shiftId}`).value);
          if (!endKm || endKm < 0) {
            alert('Introduza um valor válido para os Km finais.');
            return;
          }

          const fuelLitres = document.getElementById(`fuel-litres-${shiftId}`).value || null;
          const fuelCost = document.getElementById(`fuel-cost-${shiftId}`).value || null;
          const invoiced = document.getElementById(`invoiced-${shiftId}`).value || null;
          const invoiceNum = document.getElementById(`invoice-num-${shiftId}`).value || null;
          const notes = document.getElementById(`notes-${shiftId}`).value || null;
          const photoFile = document.getElementById(`end-photo-${shiftId}`).files[0];
          let endPhotoUrl = null;

          if (photoFile) {
            const compressed = await compressImage(photoFile);
            const path = `uploads/${Date.now()}_${photoFile.name}`;
            const { error: uploadError } = await supabase.storage.from('fleet-photos').upload(path, compressed);
            if (uploadError) throw uploadError;
            const { data: urlData } = supabase.storage.from('fleet-photos').getPublicUrl(path);
            endPhotoUrl = urlData.publicUrl;
          }

          const updateData = {
            end_km: endKm,
            fuel_litres: fuelLitres ? parseFloat(fuelLitres) : null,
            fuel_cost: fuelCost ? parseFloat(fuelCost) : null,
            invoiced_amount: invoiced ? parseFloat(invoiced) : null,
            invoice_number: invoiceNum,
            notes: notes,
            closed: true,
            updated_at: new Date().toISOString()
          };
          if (endPhotoUrl) updateData.end_photo_url = endPhotoUrl;

          console.log('A encerrar turno ' + shiftId + '. Dados:', updateData);

          const { error: reportError } = await supabase
            .from('shift_reports')
            .update(updateData)
            .eq('shift_id', shiftId);

          if (reportError) {
            console.error('Erro ao atualizar relatório:', reportError);
            throw reportError;
          }

          console.log('Relatório atualizado. A atualizar shift para completed...');

          const { error: shiftError } = await supabase
            .from('shifts')
            .update({ status: 'completed' })
            .eq('id', shiftId)
            .eq('status', 'started');

          if (shiftError) {
            console.error('Erro ao atualizar shift:', shiftError);
            throw shiftError;
          }

          console.log('Shift atualizado para completed com sucesso!');

          alert('Turno encerrado com sucesso!');
          loadMyShifts();
          loadHistory();
        } catch (err) {
          console.error('Erro ao encerrar turno:', err);
          alert('Erro ao encerrar turno: ' + err.message);
          loadMyShifts();
        }
      }

      // =============================================
      // DISPONIBILIDADE (NOVO SISTEMA SIMPLIFICADO)
      // =============================================
      async function loadAvailability() {
        try {
          const { data: existing } = await supabase
            .from('driver_availability')
            .select('*')
            .eq('driver_id', currentUser.id)
            .gte('date', new Date().toISOString().split('T')[0])
            .order('date');

          availabilityPeriods = (existing || []).map(a => ({
            date: a.date,
            start_time: a.start_time,
            end_time: a.end_time
          }));

          renderPeriodsList();
        } catch (err) {
          console.error('Erro ao carregar disponibilidade:', err);
        }
      }

      function renderPeriodsList() {
        const container = document.getElementById('periods-list');
        const replicateSection = document.getElementById('replicate-section');

        if (availabilityPeriods.length === 0) {
          container.innerHTML = '<p class="empty-msg">Nenhum período adicionado.</p>';
          replicateSection.style.display = 'none';
        } else {
          const grouped = {};
          availabilityPeriods.forEach(p => {
            if (!grouped[p.date]) grouped[p.date] = [];
            grouped[p.date].push(p);
          });

          let html = '';
          Object.keys(grouped).sort().forEach(date => {
            const dateLabel = date.split('-').reverse().join('/');
            html += `<div style="margin-bottom:10px;"><strong>📅 ${dateLabel}</strong>`;
            grouped[date].forEach((p) => {
              html += `<div style="display:flex;align-items:center;gap:10px;margin:5px 0;padding:5px;background:#fff;border-radius:4px;">
                <span>🕐 ${p.start_time?.substring(0,5)} - ${p.end_time?.substring(0,5)}</span>
                <button class="delete-btn-sm" data-date="${p.date}" data-start="${p.start_time}" data-end="${p.end_time}" style="margin-left:auto;">🗑️</button>
              </div>`;
            });
            html += '</div>';
          });
          container.innerHTML = html;
          replicateSection.style.display = 'block';

          container.querySelectorAll('.delete-btn-sm').forEach(btn => {
            btn.addEventListener('click', () => {
              const date = btn.dataset.date;
              const start = btn.dataset.start;
              const end = btn.dataset.end;
              availabilityPeriods = availabilityPeriods.filter(p => !(p.date === date && p.start_time === start && p.end_time === end));
              renderPeriodsList();
            });
          });
        }
      }

      document.getElementById('add-period-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const date = document.getElementById('period-date').value;
        const start = document.getElementById('period-start').value;
        const end = document.getElementById('period-end').value;

        if (!date || !start || !end) { alert('Preencha todos os campos.'); return; }
        if (start >= end) { alert('Hora de início deve ser anterior à hora de fim.'); return; }

        const duplicate = availabilityPeriods.find(p => p.date === date && p.start_time === start && p.end_time === end);
        if (duplicate) { alert('Este período já foi adicionado.'); return; }

        availabilityPeriods.push({ date, start_time: start, end_time: end });
        availabilityPeriods.sort((a, b) => a.date.localeCompare(b.date) || a.start_time.localeCompare(b.start_time));
        renderPeriodsList();
        e.target.reset();
        document.getElementById('period-date').focus();
      });

      document.getElementById('replicate-btn').addEventListener('click', () => {
        const from = document.getElementById('replicate-from').value;
        const to = document.getElementById('replicate-to').value;

        if (!from || !to) { alert('Selecione as datas de início e fim.'); return; }
        if (from > to) { alert('A data "De" deve ser anterior à data "Até".'); return; }
        if (availabilityPeriods.length === 0) { alert('Adicione pelo menos um período primeiro.'); return; }

        const periodsToReplicate = [...availabilityPeriods];
        const startDate = new Date(from);
        const endDate = new Date(to);

        for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
          const dateStr = d.toISOString().split('T')[0];
          periodsToReplicate.forEach(p => {
            const exists = availabilityPeriods.find(ap => ap.date === dateStr && ap.start_time === p.start_time && ap.end_time === p.end_time);
            if (!exists) {
              availabilityPeriods.push({ date: dateStr, start_time: p.start_time, end_time: p.end_time });
            }
          });
        }

        availabilityPeriods.sort((a, b) => a.date.localeCompare(b.date) || a.start_time.localeCompare(b.start_time));
        renderPeriodsList();
        alert('Períodos replicados com sucesso!');
      });

      document.getElementById('save-availability-btn').addEventListener('click', async () => {
        try {
          const msg = document.getElementById('availability-msg');
          msg.textContent = 'A guardar...'; msg.style.color = '#666';

          await supabase.from('driver_availability').delete().eq('driver_id', currentUser.id).gte('date', new Date().toISOString().split('T')[0]);

          if (availabilityPeriods.length > 0) {
            const inserts = availabilityPeriods.map(p => ({
              driver_id: currentUser.id,
              date: p.date,
              start_time: p.start_time,
              end_time: p.end_time
            }));
            const { error } = await supabase.from('driver_availability').insert(inserts);
            if (error) throw error;
          }

          msg.textContent = 'Disponibilidade guardada com sucesso!'; msg.style.color = 'green';
        } catch (err) {
          document.getElementById('availability-msg').textContent = 'Erro: ' + err.message;
          document.getElementById('availability-msg').style.color = 'red';
        }
      });

      document.getElementById('clear-availability-btn').addEventListener('click', () => {
        if (confirm('Limpar todos os períodos adicionados?')) {
          availabilityPeriods = [];
          renderPeriodsList();
        }
      });

      // =============================================
      // HISTÓRICO
      // =============================================
      async function loadHistory() {
        try {
          const { data, error } = await supabase
            .from('shift_reports')
            .select('*, shifts(date, vehicles(*))')
            .eq('driver_id', currentUser.id)
            .order('created_at', { ascending: false });

          if (error) throw error;

          const container = document.getElementById('history-list');
          if (!data || data.length === 0) {
            container.innerHTML = '<p class="empty-msg">Nenhum turno no histórico.</p>';
            return;
          }

          container.innerHTML = data.map(r => {
            const distance = (r.start_km && r.end_km) ? (r.end_km - r.start_km) : null;
            return `
              <div class="card history-card">
                <div class="history-info">
                  <strong>📅 ${r.shifts?.date || 'N/A'} | 🚗 ${r.shifts?.vehicles?.license_plate || 'N/A'}</strong>
                  <span>🔢 Km: ${r.start_km || '?'} → ${r.end_km || '?'} ${distance ? '| Distância: ' + distance + ' km' : ''}</span>
                  <span>⛽ Combustível: ${r.fuel_litres || '0'} L | 💰 Custo: ${r.fuel_cost || '0'} €</span>
                  <span>💶 Faturado: ${r.invoiced_amount || '0'} € ${r.invoice_number ? '| 🧾 Fatura nº: ' + r.invoice_number : ''}</span>
                  <span>📝 Notas: ${r.notes || 'Nenhuma'}</span>
                  ${r.closed ? '<span><strong>📝 Notas pós-encerramento:</strong> ' + (r.notes_after_close || 'Nenhuma') + '</span>' : ''}
                  <div class="photo-links">
                    ${r.start_photo_url ? `<a href="${r.start_photo_url}" target="_blank" class="photo-link">📷 Foto inicial</a>` : ''}
                    ${r.end_photo_url ? `<a href="${r.end_photo_url}" target="_blank" class="photo-link">📷 Foto final</a>` : ''}
                  </div>
                </div>
                ${r.closed ? `<button class="add-note-btn" data-add-note="${r.id}">✏️ Adicionar/Editar nota pós-encerramento</button>` : ''}
              </div>
            `;
          }).join('');

          container.querySelectorAll('[data-add-note]').forEach(btn => {
            btn.addEventListener('click', async () => {
              const reportId = btn.dataset.addNote;
              const currentNote = data.find(r => r.id == reportId)?.notes_after_close || '';
              const note = prompt('Escreva ou edite a nota pós-encerramento:', currentNote);
              if (note !== null) {
                const { error: updateError } = await supabase.from('shift_reports').update({ notes_after_close: note }).eq('id', reportId);
                if (updateError) {
                  alert('Erro ao guardar nota: ' + updateError.message);
                } else {
                  await loadHistory();
                }
              }
            });
          });
        } catch (err) {
          console.error('Erro ao carregar histórico:', err);
          document.getElementById('history-list').innerHTML = '<p class="error-msg">Erro ao carregar histórico: ' + err.message + '</p>';
        }
      }

      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxWidth = 1200;
              let width = img.width;
              let height = img.height;
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              canvas.toBlob((blob) => {
                if (!blob) {
                  reject(new Error('Falha ao comprimir imagem'));
                  return;
                }
                const fileName = `${Date.now()}_${file.name || 'foto.jpg'}`;
                const compressedFile = new File([blob], fileName, { type: 'image/jpeg' });
                resolve(compressedFile);
              }, 'image/jpeg', 0.7);
            };
            img.onerror = () => reject(new Error('Erro ao carregar imagem'));
          };
          reader.onerror = () => reject(new Error('Erro ao ler ficheiro'));
        });
      }
    })();
  </script>
</body>
